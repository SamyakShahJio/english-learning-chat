<style>
@font-face { font-family: 'JioType'; font-weight: 400; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeVarW05-Regular.woff2') format('woff2'); }

:root {
  --primary: #3535f3;
  --primary-light: #e8e8fc;
  --primary-dark: #3900ad;
  --secondary: #f7ab20;
  --sparkle: #1eccb0;
  --error: #fa2f40;
  --warning: #f06d0f;
  --success: #25ab21;
  --grey-100: #141414;
  --grey-80: #5c5c5c;
  --grey-60: #8f8f8f;
  --grey-40: #e0e0e0;
  --grey-20: #f5f5f5;
  --surface-ghost: #eeeeef;
  --surface-bold: #3900ad;
  --white: #ffffff;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 23px;
  --radius-pill: 999px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: 'JioType'; background: var(--white); display: flex; flex-direction: column; }

.phone-frame {
  width: 100%; height: 100%; background: var(--white);
  position: relative; overflow: hidden;
}

.notch { display: none; }
.notch-pill { display: none; }
.status-bar { display: none; }
.battery { display: none; }
.battery-fill { display: none; }

.chat-header {
  height: 56px; padding: 0 16px; display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--grey-40); background: var(--white); position: relative; z-index: 80;
}
.back-btn {
  width: 32px; height: 32px; border-radius: 50%; border: none; background: transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; color: var(--grey-100); flex-shrink: 0;
}
.back-btn:hover { background: var(--surface-ghost); }
.back-btn:active { transform: scale(0.9); }
.chat-header-avatar {
  width: 36px; height: 36px; border-radius: 50%; background: var(--primary);
  display: flex; align-items: center; justify-content: center;
}
.chat-header-info h3 { font-size: 16px; font-weight: 700; color: var(--grey-100); line-height: 1.2; }
.chat-header-info span { font-size: 12px; color: var(--success); font-weight: 500; }

.chat-area {
  flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 8px;
  display: flex; flex-direction: column; gap: 12px;
  scroll-behavior: smooth; background: var(--white);
}
.chat-area::-webkit-scrollbar { width: 0; }
.chat-body { display: flex; flex-direction: column; height: calc(100vh - 56px - 88px); }

.msg { max-width: 88%; animation: msgIn 0.35s ease-out; }
.msg-ai { align-self: flex-start; }
.msg-user { align-self: flex-end; }

.bubble {
  padding: 12px 16px; font-size: 14px; line-height: 1.5; color: var(--grey-100);
  word-wrap: break-word;
}
.bubble-ai {
  background: var(--surface-ghost); border-radius: 4px var(--radius-lg) var(--radius-lg) var(--radius-lg);
}
.bubble-user {
  background: var(--primary); color: var(--white);
  border-radius: var(--radius-lg) 4px var(--radius-lg) var(--radius-lg);
}

.chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.chip {
  padding: 8px 16px; border-radius: var(--radius-pill); border: 1.5px solid var(--primary);
  color: var(--primary); font-size: 13px; font-weight: 700; cursor: pointer;
  background: var(--white); transition: all 0.2s;
}
.chip:hover, .chip:active { background: var(--primary); color: var(--white); }
.chip-secondary {
  border-color: var(--grey-40); color: var(--grey-80);
}
.chip-secondary:hover, .chip-secondary:active { background: var(--grey-40); color: var(--grey-100); }

/* Rubric tag */
.rubric-tag {
  display: inline-block; padding: 4px 12px; border-radius: var(--radius-pill);
  background: var(--primary-light); color: var(--primary); font-size: 10px;
  font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
}

/* Expectation card */
.expect-card {
  background: var(--grey-100); border-radius: var(--radius-lg); padding: 20px;
  color: var(--white); margin-top: 8px;
}
.expect-card h4 { font-size: 16px; font-weight: 900; margin-bottom: 4px; }
.expect-card .expect-sub { font-size: 12px; color: rgba(255,255,255,0.6); margin-bottom: 16px; }
.expect-item {
  display: flex; align-items: center; gap: 12px; padding: 10px 0;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.expect-item:first-of-type { border-top: none; }
.expect-icon {
  width: 36px; height: 36px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; flex-shrink: 0;
}
.expect-item-text h5 { font-size: 13px; font-weight: 700; }
.expect-item-text p { font-size: 11px; color: rgba(255,255,255,0.5); }

/* Mic area */
.mic-area {
  display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 20px 0; margin-top: 8px;
}
.mic-btn-large {
  width: 64px; height: 64px; border-radius: 50%; background: var(--primary); color: var(--white);
  display: flex; align-items: center; justify-content: center; border: none;
  cursor: pointer; box-shadow: 0 4px 20px rgba(53,53,243,0.3); transition: all 0.2s;
}
.mic-btn-large:active { transform: scale(0.9); }
.mic-btn-large.recording { background: var(--error); animation: pulse 1.2s infinite; }
.mic-label { font-size: 13px; font-weight: 700; color: var(--primary); }
.mic-label-muted { font-size: 11px; color: var(--grey-60); }
.mic-waves { display: flex; gap: 3px; align-items: center; height: 32px; }
.mic-wave { width: 3px; background: var(--primary); border-radius: 99px; animation: waveAnim 0.8s ease-in-out infinite; }

/* Progress bar */
.progress-bar-container {
  background: var(--grey-40); border-radius: var(--radius-pill); height: 6px;
  width: 100%; margin-top: 8px; overflow: hidden;
}
.progress-bar-fill {
  height: 100%; background: var(--primary); border-radius: var(--radius-pill);
  transition: width 0.5s ease;
}

/* Question card */
.question-card {
  background: var(--surface-ghost); border-radius: var(--radius-lg); padding: 16px; margin-top: 8px;
  border-left: 3px solid var(--primary);
}
.question-card .q-number { font-size: 10px; font-weight: 700; color: var(--grey-60); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.question-card .q-text { font-size: 15px; font-weight: 700; color: var(--grey-100); line-height: 1.5; }
.question-card .q-hint { font-size: 11px; color: var(--grey-60); margin-top: 8px; font-style: italic; }

/* Recorded confirmation */
.recorded-card {
  background: rgba(37,171,33,0.08); border-radius: var(--radius-lg); padding: 14px;
  display: flex; align-items: center; gap: 10px; margin-top: 8px;
  border: 1px solid rgba(37,171,33,0.2);
}
.recorded-card svg { color: var(--success); flex-shrink: 0; }
.recorded-card span { font-size: 13px; font-weight: 700; color: var(--success); }

/* Feedback cards */
.score-card {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: var(--radius-lg); padding: 24px; margin-top: 8px; color: var(--white); text-align: center;
}
.score-circle {
  width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center; margin: 0 auto 12px;
  font-size: 28px; font-weight: 900;
}
.score-card h3 { font-size: 18px; font-weight: 900; margin-bottom: 4px; }
.score-card p { font-size: 13px; opacity: 0.8; }

.feedback-item {
  background: var(--white); border: 1px solid var(--grey-40); border-radius: var(--radius-md);
  padding: 14px; margin-top: 8px; display: flex; gap: 10px; align-items: flex-start;
}
.feedback-item .fb-icon { flex-shrink: 0; margin-top: 2px; }
.feedback-item .fb-icon.good { color: var(--success); }
.feedback-item .fb-icon.bad { color: var(--warning); }
.feedback-item h5 { font-size: 12px; font-weight: 700; color: var(--grey-100); margin-bottom: 2px; }
.feedback-item p { font-size: 12px; color: var(--grey-60); line-height: 1.4; }
.feedback-item .hear-btn {
  display: inline-flex; align-items: center; gap: 4px; margin-top: 6px;
  padding: 4px 10px; border-radius: var(--radius-pill); background: var(--surface-ghost);
  color: var(--primary); font-size: 10px; font-weight: 700; cursor: pointer; border: none;
  transition: all 0.2s;
}
.feedback-item .hear-btn:active { background: var(--primary-light); }

/* Action plan */
.plan-card {
  background: var(--grey-100); border-radius: var(--radius-lg); padding: 20px; margin-top: 8px; color: var(--white);
}
.plan-card h4 { font-size: 14px; font-weight: 900; margin-bottom: 12px; }
.plan-item {
  display: flex; gap: 12px; padding: 8px 0; align-items: flex-start;
}
.plan-dot {
  width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0;
  background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2);
}
.plan-dot.active { background: var(--primary); border-color: var(--primary); }
.plan-item-text .plan-day { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--secondary); }
.plan-item-text h5 { font-size: 13px; font-weight: 700; }
.plan-item-text p { font-size: 11px; color: rgba(255,255,255,0.5); }

/* Multi-modal chat input */
.input-widget {
  padding: 2px 12px 16px; background: var(--white); position: relative; z-index: 80;
}
.input-field-wrap {
  background: var(--surface-ghost); border-radius: var(--radius-xl); padding: 6px;
  display: flex; flex-direction: column;
}
.input-text-area { padding: 10px 8px; display: flex; align-items: center; }
.input-text-area input {
  font-family: 'JioType'; font-size: 14px; font-weight: 400; color: var(--grey-100);
  background: transparent; border: none; outline: none; width: 100%; line-height: 1.3;
}
.input-text-area input::placeholder { color: var(--grey-60); opacity: 0.65; }
.input-actions { display: flex; justify-content: space-between; align-items: center; height: 43px; }
.input-left-actions { display: flex; gap: 2px; }
.input-icon-btn {
  width: 36px; height: 36px; border-radius: var(--radius-pill);
  display: flex; align-items: center; justify-content: center;
  background: #e7e9ff; border: none; cursor: pointer;
}
.input-icon-btn:active { opacity: 0.7; }
.input-icon-btn svg { width: 20px; height: 20px; }
.speak-btn {
  background: var(--surface-bold); border: none; border-radius: var(--radius-pill);
  padding: 10px 20px; display: flex; align-items: center; gap: 8px; cursor: pointer;
}
.speak-btn:active { opacity: 0.85; }
.speak-btn svg { width: 18px; height: 18px; }
.speak-btn span { font-family: 'JioType'; font-weight: 700; font-size: 14px; color: var(--white); line-height: 1; }
.home-indicator { display: none; }

/* Typing indicator */
.typing { display: flex; gap: 4px; padding: 12px 16px; }
.typing-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--grey-60);
  animation: typingAnim 1.2s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

/* Skeleton loading */
.skeleton {
  background: linear-gradient(90deg, var(--surface-ghost) 25%, var(--grey-40) 50%, var(--surface-ghost) 75%);
  background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: var(--radius-sm);
}
.skeleton-line { height: 14px; margin-bottom: 8px; }
.skeleton-line:last-child { width: 60%; }

/* Animations */
@keyframes msgIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(250,47,64,0.4); } 50% { box-shadow: 0 0 0 16px rgba(250,47,64,0); } }
@keyframes waveAnim { 0%, 100% { height: 6px; } 50% { height: 24px; } }
@keyframes typingAnim { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1); } }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

.hidden { display: none !important; }
.fade-in { animation: msgIn 0.4s ease-out; }
</style>

<script>
// === SVG Icon helpers ===
const ICONS = {
  mic: '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 15a3 3 0 003-3V5a3 3 0 00-6 0v7a3 3 0 003 3zm6-5a1 1 0 00-1 1v1a5 5 0 11-10 0v-1a1 1 0 10-2 0v1a7 7 0 1014 0v-1a1 1 0 00-1-1zm-3 10H9a1 1 0 000 2h6a1 1 0 000-2z"/></svg>',
  check: '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm5.21 7.71l-6 6a1.002 1.002 0 01-1.42 0l-3-3a1.003 1.003 0 111.42-1.42l2.29 2.3 5.29-5.3a1.004 1.004 0 011.42 1.42z"/></svg>',
  warning: '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm-1 4.5a1 1 0 012 0v6a1 1 0 01-2 0v-6zm1 12a1.5 1.5 0 110-3 1.5 1.5 0 010 3z"/></svg>',
  play: '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19.15 10.36l-10-7A2 2 0 008 3a1.88 1.88 0 00-.92.23A2 2 0 006 5v14a2 2 0 001.08 1.77c.282.154.599.233.92.23a2 2 0 001.15-.36l10-7a2 2 0 000-3.28z"/></svg>',
  briefcase: '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20 6h-4V4c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-6 0h-4V4h4v2z"/></svg>',
  brain: '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.94-.49-7-3.85-7-7.93 0-.62.08-1.22.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>',
  shield: '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>',
  chat: '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>',
  star: '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>',
};

// === Text-to-Speech Engine (ElevenLabs Multilingual v2) ===
const ELEVENLABS_API_KEY = 'sk_86a2daf2318ba84afa5190ff9a2c09fcc9e7f9dafea1fe79';
const ELEVENLABS_VOICE_ID = 'DQuoFsZ3oda1diTerwpq'; // Aaditya K — Calm Conversational Hindi
const ELEVENLABS_TTS_URL = `https://api.elevenlabs.io/v1/text-to-speech/${ELEVENLABS_VOICE_ID}`;
let ttsAudio = null;
let ttsCache = {}; // text → blob URL
let playbackCtx = null;

function unlockAudio() {
  if (playbackCtx) return;
  try {
    playbackCtx = new (window.AudioContext || window.webkitAudioContext)();
    playbackCtx.resume();
  } catch(e) { console.warn('AudioContext:', e); }
}
document.addEventListener('click', unlockAudio, { once: true });
document.addEventListener('touchstart', unlockAudio, { once: true });

async function speakHindi(text) {
  stopTTS();
  // Check cache first
  if (ttsCache[text]) {
    playBlobUrl(ttsCache[text]);
    return;
  }
  try {
    const res = await fetch(ELEVENLABS_TTS_URL + '?output_format=mp3_44100_128', {
      method: 'POST',
      headers: {
        'Accept': 'audio/mpeg',
        'Content-Type': 'application/json',
        'xi-api-key': ELEVENLABS_API_KEY
      },
      body: JSON.stringify({
        text: text,
        model_id: 'eleven_multilingual_v2',
        voice_settings: {
          stability: 0.5,
          similarity_boost: 0.75,
          style: 0.0,
          use_speaker_boost: true
        }
      })
    });
    if (!res.ok) throw new Error('ElevenLabs API error: ' + res.status);
    const blob = await res.blob();
    const blobUrl = URL.createObjectURL(blob);
    ttsCache[text] = blobUrl;
    playBlobUrl(blobUrl);
  } catch (err) {
    console.warn('ElevenLabs TTS failed, falling back to browser TTS:', err);
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'hi-IN'; utter.rate = 0.85;
    speechSynthesis.speak(utter);
  }
}

function playBlobUrl(url) {
  ttsAudio = new Audio(url);
  if (playbackCtx) playbackCtx.resume();
  ttsAudio.play().catch(err => console.warn('Audio play failed:', err));
}

function stopTTS() {
  if (ttsAudio) { ttsAudio.pause(); ttsAudio.currentTime = 0; ttsAudio = null; }
  speechSynthesis.cancel();
}

// === State Machine ===
const chatArea = document.getElementById('chatArea');
let currentState = 'welcome';
let questionIndex = 0;
let stateTransitioning = false; // guard against double-entry

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

function addMsg(type, html, delay=0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const div = document.createElement('div');
      div.className = `msg msg-${type} fade-in`;
      div.innerHTML = `<div class="bubble bubble-${type}">${html}</div>`;
      chatArea.appendChild(div);
      scrollToBottom();
      resolve();
    }, delay);
  });
}

function addRaw(html, delay=0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const div = document.createElement('div');
      div.className = 'msg msg-ai fade-in';
      div.innerHTML = html;
      chatArea.appendChild(div);
      scrollToBottom();
      resolve();
    }, delay);
  });
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg msg-ai';
  div.id = 'typing-indicator';
  div.innerHTML = `<div class="bubble bubble-ai"><div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
  chatArea.appendChild(div);
  scrollToBottom();
}

function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function scrollToBottom() {
  setTimeout(() => { chatArea.scrollTop = chatArea.scrollHeight; }, 50);
}

function handleSend() { /* placeholder for input bar send */ }

// === State transitions ===
async function goToState(state) {
  if (stateTransitioning) return; // prevent double-entry
  stateTransitioning = true;
  currentState = state;

  try { switch(state) {

    case 'welcome':
      showTyping();
      await wait(800);
      hideTyping();
      await addMsg('ai', `Namaste Deepak! Mujhe aapka resume mil gaya hai.`);
      await wait(400);
      await addMsg('ai', `Kaunsi job ke liye interview hai?`);
      await addRaw(`<div class="chips">
        <span class="chip" onclick="selectRole('Delivery Partner')">Delivery Partner</span>
        <span class="chip chip-secondary" onclick="selectRole('Sales Executive')">Sales Executive</span>
      </div>`, 200);
      break;

    case 'role_selected':
      showTyping();
      await wait(600);
      hideTyping();
      await addMsg('ai', `Achha, Delivery Partner. Kis company ka interview hai?`);
      await addRaw(`<div class="chips">
        <span class="chip" onclick="selectCompany('Swiggy')">Swiggy</span>
        <span class="chip chip-secondary" onclick="selectCompany('Zomato')">Zomato</span>
      </div>`, 200);
      break;

    case 'company_selected':
      showTyping();
      await wait(600);
      hideTyping();
      await addMsg('ai', `Bahut achha! Swiggy ka interview kab hai?`);
      await addRaw(`<div class="chips">
        <span class="chip" onclick="selectDate('4 din mein')">4 din mein</span>
        <span class="chip chip-secondary" onclick="selectDate('Next Week')">Next Week</span>
      </div>`, 200);
      break;

    case 'date_selected':
      showTyping();
      await wait(800);
      hideTyping();
      await addMsg('ai', `4 din hai humare paas. Chalo practice shuru karte hain!`);
      await wait(600);
      showTyping();
      await wait(800);
      hideTyping();
      await addMsg('ai', `Pehle samjho ki interviewer kya dekhta hai. Yeh 3 cheezein test hoti hain:`);
      await addRaw(`<div class="expect-card">
        <h4>Game Plan</h4>
        <div class="expect-sub">Interview mein yeh 3 cheezein test hongi:</div>
        <div class="expect-item">
          <div class="expect-icon" style="background:rgba(30,204,176,0.15);color:var(--sparkle)">${ICONS.brain}</div>
          <div class="expect-item-text"><h5>Problem Solving</h5><p>Mushkil situation mein kya karoge?</p></div>
        </div>
        <div class="expect-item">
          <div class="expect-icon" style="background:rgba(247,171,32,0.15);color:var(--secondary)">${ICONS.chat}</div>
          <div class="expect-item-text"><h5>Customer Handling</h5><p>Gusse wale customer ko kaise sambhaloge?</p></div>
        </div>
        <div class="expect-item">
          <div class="expect-icon" style="background:rgba(250,47,64,0.1);color:var(--error)">${ICONS.shield}</div>
          <div class="expect-item-text"><h5>Process & SOP</h5><p>Company ke rules pata hain?</p></div>
        </div>
      </div>`, 300);
      await addRaw(`<div class="chips">
        <span class="chip" onclick="startQuestions()">Shuru karo</span>
      </div>`, 200);
      break;

    case 'ask_question':
      const q = questions[questionIndex];
      showTyping();
      await wait(800);
      hideTyping();

      // Progress bar
      await addRaw(`<div style="margin-top:4px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
          <span style="font-size:10px;font-weight:700;color:var(--grey-60);text-transform:uppercase;letter-spacing:1px;">Sawaal ${q.number} / ${questions.length}</span>
          <span class="rubric-tag">${q.rubricHindi}</span>
        </div>
        <div class="progress-bar-container">
          <div class="progress-bar-fill" style="width:${(q.number / questions.length) * 100}%"></div>
        </div>
      </div>`, 0);

      // Fire TTS immediately (don't await — let it load while UI renders)
      speakHindi(q.hindi);

      // Question card
      await addRaw(`<div class="question-card">
        <div class="q-number">Sawaal ${q.number}</div>
        <div class="q-text">${q.hindi}</div>
        <div class="q-hint">Testing: ${q.rubric}</div>
      </div>`, 200);

      // Mic button to answer (unique ID per question to avoid DOM collision)
      await addRaw(`<div class="mic-area" id="answerMicArea-${questionIndex}">
        <div class="mic-label">Jawab dene ke liye mic dabao</div>
        <button class="mic-btn-large" id="answerMicBtn-${questionIndex}" onclick="simulateRecording(${questionIndex})">
          ${ICONS.mic}
        </button>
        <div class="mic-label-muted">Tap karke bolo</div>
      </div>`, 300);
      break;

    case 'question_answered':
      if (questionIndex < questions.length - 1) {
        await addRaw(`<div class="chips">
          <span class="chip" onclick="nextQuestion()">Agla sawaal</span>
        </div>`, 200);
      } else {
        await addRaw(`<div class="chips">
          <span class="chip" onclick="showFeedback()">Report dekho</span>
        </div>`, 200);
      }
      break;

    case 'feedback':
      showTyping();
      await wait(1000);
      hideTyping();
      await addMsg('ai', `Interview practice khatam! Yeh raha aapka report:`);

      // Score card
      await addRaw(`<div class="score-card">
        <div class="score-circle">74%</div>
        <h3>Almost there!</h3>
        <p>Achha attitude, lekin standard process yaad rakho.</p>
      </div>`, 300);

      await wait(400);
      await addMsg('ai', `Har sawaal ka analysis:`);

      // Feedback items
      for (let i = 0; i < feedbackData.length; i++) {
        const fb = feedbackData[i];
        const iconClass = fb.status === 'good' ? 'good' : 'bad';
        const icon = fb.status === 'good' ? ICONS.check : ICONS.warning;
        const btnLabel = fb.status === 'good' ? 'Sahi tarika suno' : 'Kaise sudhaarein, suno';
        const safeText = fb.better.replace(/'/g, "\\'");
        await addRaw(`<div class="feedback-item">
          <div class="fb-icon ${iconClass}">${icon}</div>
          <div>
            <h5>${fb.q}</h5>
            <p>${fb.feedback}</p>
            <button class="hear-btn" onclick="speakHindi('${safeText}')">${ICONS.play} ${btnLabel}</button>
          </div>
        </div>`, i === 0 ? 0 : 150);
      }

      // Action plan
      await wait(300);
      await addRaw(`<div class="plan-card">
        <h4>3 Din ka Success Plan</h4>
        <div class="plan-item">
          <div class="plan-dot active">${ICONS.star}</div>
          <div class="plan-item-text">
            <div class="plan-day">Din 1</div>
            <h5>Speed Fix Karo</h5>
            <p>Dheere bolne ki practice karo</p>
          </div>
        </div>
        <div class="plan-item">
          <div class="plan-dot">2</div>
          <div class="plan-item-text">
            <div class="plan-day">Din 2</div>
            <h5>Mock Interview #2</h5>
            <p>'Angry Customer' scenario practice</p>
          </div>
        </div>
        <div class="plan-item">
          <div class="plan-dot">3</div>
          <div class="plan-item-text">
            <div class="plan-day">Din 3</div>
            <h5>Final Check</h5>
            <p>2 minute warm-up practice</p>
          </div>
        </div>
      </div>`, 300);

      await addRaw(`<div class="chips" style="margin-top:12px;">
        <span class="chip" onclick="restartPractice()">Dobara practice karo</span>
        <span class="chip chip-secondary" onclick="goToState('welcome')">Naya interview setup</span>
      </div>`, 200);
      break;
  } } finally { stateTransitioning = false; }
}

// === User actions ===
function selectRole(role) {
  disableChips();
  addMsg('user', role).then(() => goToState('role_selected'));
}

function selectCompany(company) {
  disableChips();
  addMsg('user', company).then(() => goToState('company_selected'));
}

function selectDate(date) {
  disableChips();
  addMsg('user', date).then(() => goToState('date_selected'));
}

function startQuestions() {
  disableChips();
  questionIndex = 0;
  addMsg('user', 'Shuru karo').then(() => goToState('ask_question'));
}

function simulateRecording(qIdx) {
  const btn = document.getElementById('answerMicBtn-' + qIdx);
  if (!btn) return;
  stopTTS(); // Stop TTS if still speaking
  btn.classList.add('recording');
  btn.innerHTML = `<div style="display:flex;gap:3px;align-items:center;height:20px;">
    <div style="width:3px;background:white;border-radius:99px;animation:waveAnim 1s infinite;height:8px;"></div>
    <div style="width:3px;background:white;border-radius:99px;animation:waveAnim 1.2s infinite;height:16px;"></div>
    <div style="width:3px;background:white;border-radius:99px;animation:waveAnim 0.8s infinite;height:12px;"></div>
  </div>`;
  const area = document.getElementById('answerMicArea-' + qIdx);
  if (area) {
    const label = area.querySelector('.mic-label');
    if (label) { label.textContent = 'Recording...'; label.style.color = 'var(--error)'; }
    const sub = area.querySelector('.mic-label-muted');
    if (sub) sub.textContent = 'Rokne ke liye dobara dabao';
  }

  btn.onclick = function() { finishRecording(qIdx); };

  // Auto-stop after 4 seconds
  setTimeout(() => {
    if (btn.classList.contains('recording')) {
      finishRecording(qIdx);
    }
  }, 4000);
}

function finishRecording(qIdx) {
  const btn = document.getElementById('answerMicBtn-' + qIdx);
  if (!btn) return;
  btn.classList.remove('recording');
  btn.innerHTML = ICONS.check;
  btn.style.background = 'var(--success)';
  btn.onclick = null;
  const area = document.getElementById('answerMicArea-' + qIdx);
  if (area) {
    const label = area.querySelector('.mic-label');
    if (label) { label.textContent = 'Record ho gaya'; label.style.color = 'var(--success)'; }
    const sub = area.querySelector('.mic-label-muted');
    if (sub) sub.textContent = '';
  }
  setTimeout(() => goToState('question_answered'), 500);
}

function nextQuestion() {
  disableChips();
  questionIndex++;
  addMsg('user', 'Agla sawaal').then(() => goToState('ask_question'));
}

function showFeedback() {
  disableChips();
  addMsg('user', 'Report dekho').then(() => goToState('feedback'));
}

function restartPractice() {
  disableChips();
  questionIndex = 0;
  // Clear chat
  chatArea.innerHTML = '';
  goToState('welcome');
}

// Disable all visible chips after selection
function disableChips() {
  document.querySelectorAll('.chip').forEach(c => {
    c.style.pointerEvents = 'none';
    c.style.opacity = '0.38';
  });
}

// === Preload all TTS audio on page load ===
async function preloadAllTTS() {
  // Collect all texts that will need TTS
  const textsToPreload = [
    ...questions.map(q => q.hindi),
    ...feedbackData.map(fb => fb.better)
  ];

  // Preload sequentially (2 at a time) to avoid ElevenLabs rate limits
  for (let i = 0; i < textsToPreload.length; i += 2) {
    const batch = textsToPreload.slice(i, i + 2);
    await Promise.allSettled(batch.map(async (text) => {
      if (ttsCache[text]) return;
      try {
        const res = await fetch(ELEVENLABS_TTS_URL + '?output_format=mp3_44100_128', {
          method: 'POST',
          headers: {
            'Accept': 'audio/mpeg',
            'Content-Type': 'application/json',
            'xi-api-key': ELEVENLABS_API_KEY
          },
          body: JSON.stringify({
            text: text,
            model_id: 'eleven_multilingual_v2',
            voice_settings: { stability: 0.5, similarity_boost: 0.75, style: 0.0, use_speaker_boost: true }
          })
        });
        if (!res.ok) return;
        const blob = await res.blob();
        ttsCache[text] = URL.createObjectURL(blob);
      } catch (e) { /* silently skip failed preloads */ }
    }));
  }
  console.log('TTS preload done:', Object.keys(ttsCache).length, 'clips cached');
}

// === Start ===
goToState('welcome');
preloadAllTTS(); // fire in background, doesn't block UI
</script>
