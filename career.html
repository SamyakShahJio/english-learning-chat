<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Career — JioBharatIQ</title>
<style>
@font-face{font-family:'JioType';font-weight:400;src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeVarW05-Regular.woff2') format('woff2')}
@font-face{font-family:'JioType';font-weight:500;src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Medium.woff2') format('woff2')}
@font-face{font-family:'JioType';font-weight:700;src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Bold.woff2') format('woff2')}
@font-face{font-family:'JioType';font-weight:900;src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Black.woff2') format('woff2')}

:root{
  --surface:#fff;--surface-ghost:#eeeeef;--surface-ghost-icon:#e7e9ff;--surface-bold:#3900ad;
  --text-high:#0c0d10;--text-medium:#191b1e;--text-low:rgba(25,27,30,.65);
  --icon-medium:#170054;--stroke-subtle:rgba(36,38,43,.12);
  --primary-50:#3535f3;--primary-20:#e8e8fc;
  --grey-100:#141414;--grey-20:#f5f5f5;
  --shape-pill:999px;--shape-4xl:24px;--shape-l:16px;--shape-s:8px;
  --font:'JioType',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--surface);color:var(--text-high);display:flex;flex-direction:column}
::-webkit-scrollbar{display:none}
a{text-decoration:none;color:inherit}

.hero-banner{
  position:relative;width:100%;height:137px;overflow:hidden;flex-shrink:0;
}
.hero-banner-bg{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
}
.hero-banner-overlay{
  position:absolute;inset:0;
  background:rgba(6,108,151,.5);
}
.back-btn{
  position:absolute;top:16px;left:12px;z-index:5;
  width:40px;height:40px;border-radius:50%;border:none;
  background:rgba(255,255,255,.15);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.back-btn:active{background:rgba(255,255,255,.3)}
.back-btn svg{width:20px;height:20px;color:#fff}

.avatar-section{
  display:flex;flex-direction:column;align-items:center;
  margin-top:-56px;position:relative;z-index:3;
}
.avatar-ring{
  width:120px;height:120px;border-radius:50%;
  border:3px solid #f3e8ff;background:var(--surface);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.avatar-ring img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.avatar-name{
  font-size:24px;font-weight:700;line-height:1.3;letter-spacing:-.72px;
  color:#000;text-align:center;margin-top:8px;
}

.body-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:120px}

.section-block{padding:0 16px;margin-top:24px}
.section-title{font-size:16px;font-weight:700;line-height:1.1;color:var(--grey-100);margin-bottom:12px}
.chips-grid{display:flex;flex-direction:column;gap:10px}
.chips-row{display:flex;gap:10px;flex-wrap:nowrap;overflow-x:auto}
.explore-chip{
  flex-shrink:0;display:flex;align-items:center;gap:6px;
  padding:8px 18px;border-radius:40px;
  background:#f1f1f1;cursor:pointer;white-space:nowrap;
  transition:all .15s;border:none;
}
.explore-chip:active{background:var(--primary-20)}
.explore-chip .emoji{font-size:25px;line-height:1.3}
.explore-chip .label{font-size:14px;font-weight:400;color:var(--text-high);line-height:1}

/* MULTI-MODAL CHAT INPUT */
.input-widget{
  position:fixed;bottom:0;left:0;right:0;z-index:30;
  padding:2px 12px 16px;
  background:linear-gradient(transparent,var(--surface) 30%);
}
.input-field-wrap{
  background:var(--surface-ghost);border-radius:var(--shape-4xl);
  padding:6px;display:flex;flex-direction:column;
}
.input-text-area{padding:10px 8px;display:flex;align-items:center}
.input-text-area input{
  font-family:var(--font);font-size:14px;font-weight:400;
  color:var(--text-high);background:transparent;
  border:none;outline:none;width:100%;line-height:1.3;
}
.input-text-area input::placeholder{color:var(--text-low)}
.input-actions{display:flex;justify-content:space-between;align-items:center;height:43px}
.input-left-actions{display:flex;gap:2px}
.input-icon-btn{
  width:36px;height:36px;border-radius:var(--shape-pill);
  display:flex;align-items:center;justify-content:center;
  background:var(--surface-ghost-icon);border:none;cursor:pointer;
}
.input-icon-btn:active{opacity:.7}
.input-icon-btn svg{width:20px;height:20px;fill:var(--icon-medium)}
.speak-btn{
  background:var(--surface-bold);border:none;border-radius:var(--shape-pill);
  padding:10px 20px;display:flex;align-items:center;gap:8px;cursor:pointer;
}
.speak-btn:active{opacity:.85}
.speak-btn svg{width:18px;height:18px;fill:#fff}
.speak-btn span{font-family:var(--font);font-weight:700;font-size:14px;color:#fff;line-height:1}

@keyframes fadeDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
.anim-1{animation:fadeDown .4s ease both;animation-delay:0s}
.anim-2{animation:fadeDown .4s ease both;animation-delay:.1s}
.anim-3{animation:fadeDown .4s ease both;animation-delay:.15s}
</style>
</head>
<body>

<!-- HERO BANNER -->
<div class="hero-banner anim-1">
  <img class="hero-banner-bg" src="assets/bg-career.png" alt="Career Banner">
  <div class="hero-banner-overlay"></div>
  <button class="back-btn" onclick="window.location.href='https://sunit1986.github.io/design-prototypes/jbiqhomepage.html'" aria-label="Back">
    <svg viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
</div>

<!-- AVATAR + NAME -->
<div class="avatar-section anim-1">
  <div class="avatar-ring">
    <img src="assets/avatar-career.png" alt="Career">
  </div>
  <div class="avatar-name">Career</div>
</div>

<!-- SCROLLABLE BODY -->
<div class="body-scroll">
  <div class="section-block anim-2">
    <div class="section-title">Explore</div>
    <div class="chips-grid">
      <div class="chips-row">
        <a href="https://samyakshahjio.github.io/english-learning-chat/" class="explore-chip">
          <span class="emoji">🗣️</span>
          <span class="label">English Learning</span>
        </a>
        <a href="https://samyakshahjio.github.io/english-learning-chat/interview-prep.html" class="explore-chip">
          <span class="emoji">💼</span>
          <span class="label">Interview Prep</span>
        </a>
      </div>
      <div class="chips-row">
        <a href="https://samyakshahjio.github.io/english-learning-chat/microlearning.html" class="explore-chip">
          <span class="emoji">📚</span>
          <span class="label">Microlearning</span>
        </a>
        <a href="https://samyakshahjio.github.io/english-learning-chat/govt-exam-prep.html" class="explore-chip">
          <span class="emoji">🏛️</span>
          <span class="label">Govt. Exams</span>
        </a>
      </div>
    </div>
  </div>

  <div style="height:32px"></div>
</div>

<!-- MULTI-MODAL CHAT INPUT -->
<div class="input-widget">
  <div class="input-field-wrap">
    <div class="input-text-area">
      <input type="text" placeholder="Hey Deepa, what's on your mind?" readonly>
    </div>
    <div class="input-actions">
      <div class="input-left-actions">
        <button class="input-icon-btn" aria-label="Add">
          <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="color:var(--icon-medium)"/></svg>
        </button>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="input-icon-btn" aria-label="Mic">
          <svg viewBox="0 0 24 24"><path d="M12 15a3 3 0 003-3V5a3 3 0 00-6 0v7a3 3 0 003 3z"/><path d="M19 10v2a7 7 0 01-14 0v-2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="color:var(--icon-medium)"/><path d="M12 19v3m-3 0h6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="color:var(--icon-medium)"/></svg>
        </button>
        <button class="speak-btn">
          <svg viewBox="0 0 24 24"><path d="M12 2a1 1 0 00-1 1v18a1 1 0 002 0V3a1 1 0 00-1-1zM4 9a1 1 0 00-1 1v4a1 1 0 102 0v-4a1 1 0 00-1-1zm4-3a1 1 0 00-1 1v10a1 1 0 102 0V7a1 1 0 00-1-1zm12 3a1 1 0 00-1 1v4a1 1 0 002 0v-4a1 1 0 00-1-1zm-4-3a1 1 0 00-1 1v10a1 1 0 002 0V7a1 1 0 00-1-1z" fill="currentColor"/></svg>
          <span>Speak</span>
        </button>
      </div>
    </div>
  </div>
</div>

</body>
</html>
