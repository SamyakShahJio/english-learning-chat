<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career - JioBharatIQ</title>

<style>
@font-face { font-family: 'JioType'; font-weight: 400; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeVarW05-Regular.woff2') format('woff2'); }
@font-face { font-family: 'JioType'; font-weight: 500; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Medium.woff2') format('woff2'); }
@font-face { font-family: 'JioType'; font-weight: 700; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Bold.woff2') format('woff2'); }
@font-face { font-family: 'JioType'; font-weight: 900; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Black.woff2') format('woff2'); }

:root {
  --primary: #3535f3;
  --primary-light: #e8e8fc;
  --primary-dark: #3900ad;
  --secondary: #f7ab20;
  --sparkle: #1eccb0;
  --error: #fa2f40;
  --warning: #f06d0f;
  --success: #25ab21;
  --grey-100: #141414;
  --grey-80: #5c5c5c;
  --grey-60: #8f8f8f;
  --grey-40: #e0e0e0;
  --grey-20: #f5f5f5;
  --surface-ghost: #eeeeef;
  --surface-bold: #3900ad;
  --white: #ffffff;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 23px;
  --radius-pill: 999px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'JioType';
  background: var(--grey-20);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 16px;
}

.phone-frame {
  width: 100%; max-width: 420px; height: 900px; background: var(--white);
  border-radius: 24px;
  position: relative; overflow: hidden;
  box-shadow: 0 60px 120px -30px rgba(0,0,0,0.3);
  display: flex; flex-direction: column;
}

/* Hero header */
.hero-header {
  position: relative;
  width: 100%;
  height: 280px;
  background: linear-gradient(180deg, #1a1a2e 0%, #2d1b4e 40%, #4a2080 70%, #6b3fa0 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding-bottom: 24px;
  flex-shrink: 0;
}

.hero-header::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: radial-gradient(ellipse at 50% 80%, rgba(107, 63, 160, 0.6) 0%, transparent 70%);
  pointer-events: none;
}

/* Back button */
.back-btn {
  position: absolute;
  top: 16px;
  left: 16px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(8px);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  transition: all 0.2s;
}
.back-btn:hover {
  background: rgba(255, 255, 255, 0.25);
}
.back-btn:active {
  transform: scale(0.9);
}

/* Avatar */
.hero-avatar {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  overflow: hidden;
  border: 3px solid rgba(255, 255, 255, 0.3);
  margin-bottom: 16px;
  z-index: 2;
  background: linear-gradient(135deg, #4a2080, #6b3fa0);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
}

.hero-avatar svg {
  opacity: 0.9;
}

.hero-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--white);
  z-index: 2;
  letter-spacing: 0.5px;
}

/* Decorative elements */
.hero-particles {
  position: absolute;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  pointer-events: none;
  overflow: hidden;
}

.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: rgba(255, 255, 255, 0.3);
  border-radius: 50%;
  animation: float 6s ease-in-out infinite;
}

.particle:nth-child(1) { top: 20%; left: 15%; animation-delay: 0s; }
.particle:nth-child(2) { top: 40%; left: 80%; animation-delay: 1s; width: 3px; height: 3px; }
.particle:nth-child(3) { top: 60%; left: 25%; animation-delay: 2s; width: 5px; height: 5px; }
.particle:nth-child(4) { top: 30%; left: 65%; animation-delay: 3s; }
.particle:nth-child(5) { top: 70%; left: 50%; animation-delay: 4s; width: 3px; height: 3px; }
.particle:nth-child(6) { top: 15%; left: 45%; animation-delay: 1.5s; width: 2px; height: 2px; }
.particle:nth-child(7) { top: 55%; left: 90%; animation-delay: 2.5s; }

@keyframes float {
  0%, 100% { transform: translateY(0) scale(1); opacity: 0.3; }
  50% { transform: translateY(-20px) scale(1.5); opacity: 0.7; }
}

/* Content area */
.content-area {
  flex: 1;
  padding: 24px 20px;
  overflow-y: auto;
}

.content-area::-webkit-scrollbar { width: 0; }

.section-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--grey-100);
  margin-bottom: 16px;
}

/* Explore chips grid */
.explore-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.explore-chip {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px;
  border-radius: var(--radius-lg);
  border: 1.5px solid var(--grey-40);
  background: var(--white);
  cursor: pointer;
  transition: all 0.25s ease;
  text-decoration: none;
  color: var(--grey-100);
  font-size: 13px;
  font-weight: 600;
  font-family: 'JioType';
  position: relative;
  overflow: hidden;
}

.explore-chip::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: var(--primary-light);
  opacity: 0;
  transition: opacity 0.25s ease;
  pointer-events: none;
}

.explore-chip:hover {
  border-color: var(--primary);
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(53, 53, 243, 0.15);
}

.explore-chip:hover::after {
  opacity: 1;
}

.explore-chip:active {
  transform: scale(0.97);
  box-shadow: none;
}

.chip-emoji {
  font-size: 22px;
  line-height: 1;
  z-index: 1;
  flex-shrink: 0;
}

.chip-label {
  z-index: 1;
  line-height: 1.3;
}

/* Input bar */
.input-bar {
  height: 68px;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-top: 1px solid var(--grey-40);
  background: var(--white);
  flex-shrink: 0;
}

.input-field {
  flex: 1;
  height: 44px;
  border: none;
  background: var(--surface-ghost);
  border-radius: var(--radius-pill);
  padding: 0 16px;
  font-size: 14px;
  font-family: 'JioType';
  color: var(--grey-60);
  outline: none;
}

.input-actions {
  display: flex;
  align-items: center;
  gap: 4px;
}

.action-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  color: var(--grey-80);
}

.action-btn:hover {
  background: var(--surface-ghost);
}

.action-btn.speak-btn {
  background: var(--primary);
  color: var(--white);
  width: 44px;
  height: 36px;
  border-radius: var(--radius-pill);
  gap: 4px;
  font-size: 11px;
  font-weight: 700;
  font-family: 'JioType';
  padding: 0 10px;
}

.action-btn.speak-btn:hover {
  background: var(--primary-dark);
}

/* Animations */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.explore-chip:nth-child(1) { animation: fadeInUp 0.4s ease-out 0.1s both; }
.explore-chip:nth-child(2) { animation: fadeInUp 0.4s ease-out 0.2s both; }
.explore-chip:nth-child(3) { animation: fadeInUp 0.4s ease-out 0.3s both; }
.explore-chip:nth-child(4) { animation: fadeInUp 0.4s ease-out 0.4s both; }

@keyframes heroFadeIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}

.hero-avatar { animation: heroFadeIn 0.6s ease-out 0s both; }
.hero-title { animation: fadeInUp 0.5s ease-out 0.2s both; }
.section-title { animation: fadeInUp 0.4s ease-out 0s both; }
</style>
</head>

<div class="phone-frame">

  <div class="hero-header">

  <div class="input-bar">
