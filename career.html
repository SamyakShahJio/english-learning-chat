<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Career — JioBharatIQ</title>
<style>
@font-face{font-family:'JioType';font-weight:400;src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeVarW05-Regular.woff2') format('woff2')}
@font-face{font-family:'JioType';font-weight:500;src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Medium.woff2') format('woff2')}
@font-face{font-family:'JioType';font-weight:700;src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Bold.woff2') format('woff2')}
@font-face{font-family:'JioType';font-weight:900;src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Black.woff2') format('woff2')}

:root{
  --surface:#fff;--surface-ghost:#eeeeef;--surface-ghost-icon:#e7e9ff;--surface-bold:#3900ad;
  --text-high:#0c0d10;--text-medium:#191b1e;--text-low:rgba(25,27,30,.65);
  --icon-medium:#170054;--stroke-subtle:rgba(36,38,43,.12);
  --primary-50:#3535f3;--primary-20:#e8e8fc;
  --grey-100:#141414;--grey-20:#f5f5f5;
  --shape-pill:999px;--shape-4xl:24px;--shape-l:16px;--shape-s:8px;
  --font:'JioType',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--surface);color:var(--text-high);display:flex;flex-direction:column}
::-webkit-scrollbar{display:none}
a{text-decoration:none;color:inherit}

.hero-banner{
  position:relative;width:100%;height:137px;overflow:hidden;flex-shrink:0;
}
.hero-banner-bg{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
}
.hero-banner-overlay{
  position:absolute;inset:0;
  background:rgba(6,108,151,.5);
}
.back-btn{
  position:absolute;top:16px;left:12px;z-index:5;
  width:40px;height:40px;border-radius:50%;border:none;
  background:rgba(255,255,255,.15);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.back-btn:active{background:rgba(255,255,255,.3)}
.back-btn svg{width:20px;height:20px;color:#fff}

.avatar-section{
  display:flex;flex-direction:column;align-items:center;
  margin-top:-56px;position:relative;z-index:3;
}
.avatar-ring{
  width:120px;height:120px;border-radius:50%;
  border:3px solid #f3e8ff;background:var(--surface);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.avatar-ring img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.avatar-name{
  font-size:24px;font-weight:700;line-height:1.3;letter-spacing:-.72px;
  color:#000;text-align:center;margin-top:8px;
}

.body-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:120px}

.section-block{padding:0 16px;margin-top:24px}
.section-title{font-size:16px;font-weight:700;line-height:1.1;color:var(--grey-100);margin-bottom:12px}
.chips-grid{display:flex;flex-direction:column;gap:10px}
.chips-row{display:flex;gap:10px;flex-wrap:nowrap;overflow-x:auto}
.explore-chip{
  flex-shrink:0;display:flex;align-items:center;gap:6px;
  padding:8px 18px;border-radius:40px;
  background:#f1f1f1;cursor:pointer;white-space:nowrap;
  transition:all .15s;border:none;
}
.explore-chip:active{background:var(--primary-20)}
.explore-chip .emoji{font-size:25px;line-height:1.3}
.explore-chip .label{font-size:14px;font-weight:400;color:var(--text-high);line-height:1}

/* ─── BOTTOM INPUT WIDGET (per BOTTOM-BAR-AND-VOICE-SPEC) ─── */
.input-widget{
  position:fixed;bottom:0;left:0;right:0;z-index:30;
  padding:6px 12px 16px;
  background:linear-gradient(transparent,var(--surface) 30%);
}
.input-field{
  background:#eeeeef;border-radius:24px;
  padding:8px;display:flex;flex-direction:column;gap:8px;
}
.input-top{display:flex;align-items:center;gap:4px}
.input-text{
  flex:1;padding:4px 8px;font-family:var(--font);font-size:16px;font-weight:400;
  color:var(--text-low);opacity:.65;border:none;outline:none;background:none;
  line-height:1.3;
}
.input-actions{display:flex;justify-content:space-between;align-items:center}
.input-left{display:flex;gap:2px;align-items:center}
.input-icon-btn{
  width:32px;height:32px;border-radius:50%;border:none;
  background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.input-icon-btn svg{width:20px;height:20px;color:var(--text-low);opacity:.45}
.input-icon-btn:active{background:rgba(0,0,0,.05)}
.input-right{display:flex;gap:8px;align-items:center}
.input-mic-btn{
  width:32px;height:32px;border-radius:50%;border:none;
  background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.input-mic-btn svg{width:20px;height:20px;color:var(--text-low);opacity:.45}
.speak-btn{
  background:#6d17ce;border:none;border-radius:999px;
  padding:8px 16px;display:flex;align-items:center;gap:6px;cursor:pointer;
}
.speak-btn svg{width:14px;height:14px;color:#fff}
.speak-btn span{font-family:var(--font);font-weight:700;font-size:14px;color:#fff;line-height:1}
.speak-btn:active{opacity:.85;transform:scale(.97)}

/* ─── VOICE OVERLAY: 4-dots + mic/stop (per spec) ─── */
@keyframes dotBreath{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(.92);opacity:.4}}
@keyframes dotListen{0%,100%{transform:scale(1);opacity:1}25%{transform:scale(.7);opacity:.5}50%{transform:scale(1.08);opacity:1}75%{transform:scale(.8);opacity:.6}}
@keyframes dotProcess{0%,100%{transform:scale(.8);opacity:.5}50%{transform:scale(1);opacity:1}}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(109,23,206,.4)}50%{box-shadow:0 0 0 16px rgba(109,23,206,0)}}

.v-dots{width:148px;height:148px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.v-dots div{border-radius:50%;background:#6d17ce;transition:background .3s}
.v-dots--idle div{animation:dotBreath 2.5s ease-in-out infinite;opacity:.5}
.v-dots--idle div:nth-child(2){animation-delay:.3s}
.v-dots--idle div:nth-child(3){animation-delay:.6s}
.v-dots--idle div:nth-child(4){animation-delay:.9s}
.v-dots--listening div{animation:dotListen 1s ease-in-out infinite;background:#6d17ce}
.v-dots--listening div:nth-child(2){animation-delay:.15s}
.v-dots--listening div:nth-child(3){animation-delay:.3s}
.v-dots--listening div:nth-child(4){animation-delay:.45s}
.v-dots--processing div,.v-dots--thinking div{animation:dotProcess 1.2s ease-in-out infinite;background:#9966dd}
.v-dots--processing div:nth-child(2),.v-dots--thinking div:nth-child(2){animation-delay:.2s}
.v-dots--processing div:nth-child(3),.v-dots--thinking div:nth-child(3){animation-delay:.4s}
.v-dots--processing div:nth-child(4),.v-dots--thinking div:nth-child(4){animation-delay:.6s}
.v-dots--speaking div{animation:dotBreath 2s ease-in-out infinite}

.v-mic-btn{
  width:64px;height:64px;border-radius:50%;border:none;
  background:#6d17ce;display:flex;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 4px 12px rgba(109,23,206,.35);
}
.v-mic-btn:active{transform:scale(.92)}
.v-mic-btn.v-mic--pulse{animation:micPulse 1.5s ease-in-out infinite}

.v-stop-btn{
  width:64px;height:64px;border-radius:50%;border:none;
  background:#fa2f40;display:flex;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 4px 12px rgba(250,47,64,.3);
}
.v-stop-btn:active{transform:scale(.92)}

/* Chat overlay (same as homepage) */
.ai-avatar{width:32px;height:32px;display:grid;grid-template-columns:1fr 1fr;gap:3px;flex-shrink:0}
.ai-avatar div{border-radius:50%;background:#6d17ce}
.user-bubble{
  max-width:270px;align-self:flex-end;
  background:#eeeeef;border-radius:24px 24px 0 24px;
  padding:12px 16px;font-family:var(--font);font-size:14px;font-weight:400;
  color:var(--text-high);line-height:1.45;word-break:break-word;
}
.ai-row{display:flex;gap:10px;align-items:flex-start}
.ai-bubble{flex:1;font-family:var(--font);font-size:14px;font-weight:400;color:var(--text-high);line-height:1.55;word-break:break-word}
.ai-bubble p{margin-bottom:12px}
.ai-bubble p:last-child{margin-bottom:0}
.thinking-row{display:flex;gap:10px;align-items:center}
.thinking-label{font-family:var(--font);font-size:14px;font-weight:400;color:var(--text-low)}

@keyframes fadeDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
.anim-1{animation:fadeDown .4s ease both;animation-delay:0s}
.anim-2{animation:fadeDown .4s ease both;animation-delay:.1s}
.anim-3{animation:fadeDown .4s ease both;animation-delay:.15s}
</style>
</head>

<script>
(function(){
  'use strict';
  var USER_NAME = 'Deepa';
  var SARVAM_KEY = 'sk_bjco0jfw_u9VUpaliZT6cAoT7EgaRxAks';
  var CHAT_PROXY = 'https://jbiq-proxy.sunit3-sharma.workers.dev';
  var CAREER_SYSTEM = 'You are the JioBharatIQ Career assistant. Help with career guidance, interview prep, exams, English learning, and microlearning. Answer briefly and helpfully.';

  var chatHistory = [];
  var mediaRecorder = null;
  var audioChunks = [];
  var isRecording = false;
  var currentAudio = null;
  var lastTtsBase64 = null;
  var vState = 'closed';

  document.getElementById('homeInputText').addEventListener('click', openChat);
  document.getElementById('homeInputText').removeAttribute('readonly');
  document.getElementById('homeInputText').addEventListener('focus', function(e){ e.preventDefault(); this.blur(); openChat(); });
  document.getElementById('homeSpeakBtn').addEventListener('click', openVoice);

  function openChat(){
    document.getElementById('chatOverlay').style.display = 'flex';
    setTimeout(function(){ document.getElementById('chatInput').focus(); }, 100);
  }
  function closeChat(){
    document.getElementById('chatOverlay').style.display = 'none';
  }

  document.getElementById('chatInput').addEventListener('input', function(){
    var v = this.value.trim();
    document.getElementById('chatSendBtn').style.display = v ? 'flex' : 'none';
    document.getElementById('chatSpeakBtn').style.display = v ? 'none' : 'flex';
  });
  document.getElementById('chatInput').addEventListener('keydown', function(e){
    if (e.key === 'Enter' && this.value.trim()) sendChat();
  });

  function addUserBubble(text){
    var c = document.getElementById('chatMessages');
    var d = document.createElement('div');
    d.className = 'user-bubble';
    d.textContent = text;
    c.appendChild(d);
    scrollChat();
  }
  function addThinking(){
    var c = document.getElementById('chatMessages');
    var d = document.createElement('div');
    d.className = 'thinking-row';
    d.innerHTML = '<div class="ai-avatar"><div></div><div></div><div></div><div></div></div><span class="thinking-label">Thinking...</span>';
    c.appendChild(d);
    scrollChat();
    return d;
  }
  function formatMarkdown(text){
    var html = (text||'').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>');
    var lines = html.split('\n');
    var out = '', inList = false;
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i].trim();
      if (/^[-•*]\s/.test(line)) {
        if (!inList) { out += '<ul>'; inList = true; }
        out += '<li>' + line.replace(/^[-•*]\s/,'') + '</li>';
      } else {
        if (inList) { out += '</ul>'; inList = false; }
        if (line) out += '<p>' + line + '</p>';
      }
    }
    if (inList) out += '</ul>';
    return out || ('<p>' + text + '</p>');
  }
  function addAIBubble(text){
    var c = document.getElementById('chatMessages');
    var row = document.createElement('div');
    row.className = 'ai-row';
    row.innerHTML = '<div class="ai-avatar"><div></div><div></div><div></div><div></div></div><div class="ai-bubble">' + formatMarkdown(text) + '</div>';
    c.appendChild(row);
    scrollChat();
  }
  function scrollChat(){
    var c = document.getElementById('chatMessages');
    setTimeout(function(){ c.scrollTop = c.scrollHeight; }, 50);
  }

  function callAnthropic(messages){
    var body = { messages: messages };
    return fetch(CHAT_PROXY, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
      .then(function(resp){ return resp.json().then(function(data){ if (!resp.ok) throw new Error(data.error && data.error.message || data.message || 'Chat error ' + resp.status); return data; }); })
      .then(function(data){
        if (!data.content || !Array.isArray(data.content) || !data.content[0]) throw new Error('Invalid response');
        return data.content[0].text || '';
      });
  }

  async function sendChat(){
    var inp = document.getElementById('chatInput');
    var msg = inp.value.trim();
    if (!msg) return;
    inp.value = '';
    document.getElementById('chatSendBtn').style.display = 'none';
    document.getElementById('chatSpeakBtn').style.display = 'flex';

    addUserBubble(msg);
    var thinkEl = addThinking();
    if (chatHistory.length === 0) chatHistory.push({ role: 'user', content: CAREER_SYSTEM });
    chatHistory.push({ role: 'user', content: msg });

    try {
      var resp = await callAnthropic(chatHistory);
      thinkEl.remove();
      addAIBubble(resp);
      chatHistory.push({ role: 'assistant', content: resp });
    } catch (err) {
      thinkEl.remove();
      addAIBubble('Error: ' + (err.message || 'Something went wrong. Please try again.'));
      chatHistory.pop();
    }
  }

  function openVoice(){
    document.getElementById('voiceOverlay').style.display = 'flex';
    setVoiceState('idle');
  }
  function closeVoice(){
    if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
    isRecording = false;
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    document.getElementById('voiceOverlay').style.display = 'none';
    vState = 'closed';
  }

  function setVoiceState(state){
    vState = state;
    var dots = document.getElementById('voiceDots');
    var label = document.getElementById('voiceLabel');
    var sub = document.getElementById('voiceSub');
    var transcript = document.getElementById('voiceTranscript');
    var response = document.getElementById('voiceResponse');
    var micBtn = document.getElementById('vMicBtn');
    var stopBtn = document.getElementById('vStopBtn');
    var playBtn = document.getElementById('vPlayBtn');
    var hint = document.getElementById('vAgainHint');

    dots.className = 'v-dots v-dots--' + state;

    if (state === 'idle') {
      label.textContent = 'Hey, ' + USER_NAME;
      sub.textContent = 'Tap the mic to start speaking';
      sub.style.display = '';
      transcript.style.display = 'none';
      transcript.textContent = '';
      response.style.display = 'none';
      response.innerHTML = '';
      micBtn.style.display = 'flex';
      micBtn.classList.remove('v-mic--pulse');
      stopBtn.style.display = 'none';
      if (playBtn) playBtn.style.display = 'none';
      hint.style.display = 'none';
    } else if (state === 'listening') {
      label.textContent = 'Listening...';
      sub.textContent = 'Tap the red button when done';
      sub.style.display = '';
      transcript.style.display = 'none';
      response.style.display = 'none';
      micBtn.style.display = 'none';
      stopBtn.style.display = 'flex';
      if (playBtn) playBtn.style.display = 'none';
      hint.style.display = 'none';
    } else if (state === 'processing' || state === 'thinking') {
      label.textContent = state === 'processing' ? 'Processing...' : 'Thinking...';
      sub.style.display = 'none';
      micBtn.style.display = 'none';
      stopBtn.style.display = 'none';
      if (playBtn) playBtn.style.display = 'none';
      hint.style.display = 'none';
    } else if (state === 'speaking') {
      label.textContent = '';
      sub.style.display = 'none';
      micBtn.style.display = 'flex';
      micBtn.classList.add('v-mic--pulse');
      stopBtn.style.display = 'none';
      if (playBtn) playBtn.style.display = lastTtsBase64 ? 'block' : 'none';
      hint.style.display = 'block';
    }
  }

  function voiceTapMic(){
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    startVoiceRecording();
  }
  function voiceTapStop(){
    if (isRecording && mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
    isRecording = false;
  }

  function startVoiceRecording(){
    navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream){
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
      mediaRecorder.ondataavailable = function(e){ if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = function(){
        stream.getTracks().forEach(function(t){ t.stop(); });
        if (audioChunks.length === 0) { setVoiceState('idle'); return; }
        processVoice(new Blob(audioChunks, { type: 'audio/webm' }));
      };
      mediaRecorder.start();
      isRecording = true;
      setVoiceState('listening');
    }).catch(function(err){
      document.getElementById('voiceLabel').textContent = 'Mic access denied';
      document.getElementById('voiceSub').textContent = 'Please allow microphone and try again';
      document.getElementById('voiceSub').style.display = '';
      document.getElementById('vMicBtn').style.display = 'flex';
    });
  }

  function convertToWav(webmBlob){
    return new Promise(function(resolve){
      var audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
      var reader = new FileReader();
      reader.onload = function(){
        audioCtx.decodeAudioData(reader.result).then(function(audioBuffer){
          var sampleRate = 16000;
          var offlineCtx = new OfflineAudioContext(1, audioBuffer.duration * sampleRate, sampleRate);
          var src = offlineCtx.createBufferSource();
          src.buffer = audioBuffer;
          src.connect(offlineCtx.destination);
          src.start();
          offlineCtx.startRendering().then(function(rendered){
            var pcm = rendered.getChannelData(0);
            var wavBuffer = encodeWav(pcm, sampleRate);
            resolve(new Blob([wavBuffer], { type: 'audio/wav' }));
          });
        }).catch(function(){ resolve(webmBlob); });
      };
      reader.readAsArrayBuffer(webmBlob);
    });
  }
  function encodeWav(samples, sampleRate){
    var buffer = new ArrayBuffer(44 + samples.length * 2);
    var view = new DataView(buffer);
    function w(offset, str){ for (var i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i)); }
    w(0, 'RIFF');
    view.setUint32(4, 36 + samples.length * 2, true);
    w(8, 'WAVE'); w(12, 'fmt ');
    view.setUint32(16, 16, true); view.setUint16(20, 1, true);
    view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * 2, true); view.setUint16(32, 2, true);
    view.setUint16(34, 16, true); w(36, 'data');
    view.setUint32(40, samples.length * 2, true);
    for (var i = 0; i < samples.length; i++) {
      var s = Math.max(-1, Math.min(1, samples[i]));
      view.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
    }
    return buffer;
  }

  async function processVoice(audioBlob){
    setVoiceState('processing');
    try {
      var wavBlob = await convertToWav(audioBlob);
      var fd = new FormData();
      fd.append('file', wavBlob, 'audio.wav');
      fd.append('model', 'saaras:v3');
      fd.append('language_code', 'unknown');
      fd.append('mode', 'transcribe');

      var sttResp = await fetch('https://api.sarvam.ai/speech-to-text', { method: 'POST', headers: { 'api-subscription-key': SARVAM_KEY }, body: fd });
      if (!sttResp.ok) throw new Error('Speech recognition failed');
      var sttData = await sttResp.json();
      var transcript = (sttData.transcript || '').trim();
      var detectedLang = sttData.language_code || 'en';

      if (!transcript) {
        document.getElementById('voiceLabel').textContent = "Didn't catch that";
        document.getElementById('voiceSub').textContent = 'Tap mic to try again';
        document.getElementById('voiceSub').style.display = '';
        document.getElementById('vMicBtn').style.display = 'flex';
        document.getElementById('vStopBtn').style.display = 'none';
        return;
      }

      document.getElementById('voiceTranscript').textContent = '"' + transcript + '"';
      document.getElementById('voiceTranscript').style.display = 'block';
      setVoiceState('thinking');

      if (chatHistory.length === 0) chatHistory.push({ role: 'user', content: CAREER_SYSTEM });
      chatHistory.push({ role: 'user', content: transcript });
      var aiText = await callAnthropic(chatHistory);
      chatHistory.push({ role: 'assistant', content: aiText });

      setVoiceState('speaking');
      var respEl = document.getElementById('voiceResponse');
      respEl.style.display = 'block';
      respEl.innerHTML = '<div style="font-family:var(--font);font-size:15px;color:var(--text-high);line-height:1.55">' + formatMarkdown(aiText) + '</div>';

      speakWithSarvam(aiText, detectedLang);
    } catch (err) {
      document.getElementById('voiceLabel').textContent = 'Something went wrong';
      document.getElementById('voiceSub').textContent = (err.message || 'Tap mic to try again');
      document.getElementById('voiceSub').style.display = '';
      document.getElementById('vMicBtn').style.display = 'flex';
      document.getElementById('vStopBtn').style.display = 'none';
      document.getElementById('vAgainHint').style.display = 'none';
      if (chatHistory.length > 0 && chatHistory[chatHistory.length - 1].role === 'user') chatHistory.pop();
    }
  }

  function speakWithSarvam(text, lang){
    var ttsLang = (lang && lang.indexOf('hi') === 0) ? 'hi-IN' : 'en-IN';
    var cleaned = (text || '').replace(/[#*_`>\[\](){}|~]/g,'').replace(/\n{2,}/g,'. ').replace(/\n/g,' ').replace(/\s{2,}/g,' ').trim().substring(0, 500);
    if (!cleaned) return;
    fetch('https://api.sarvam.ai/text-to-speech', {
      method: 'POST',
      headers: { 'api-subscription-key': SARVAM_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ inputs: [cleaned], target_language_code: ttsLang, speaker: 'anushka', model: 'bulbul:v2' })
    }).then(function(ttsResp){ return ttsResp.json(); }).then(function(ttsData){
      if (ttsData.audios && ttsData.audios[0]) {
        lastTtsBase64 = ttsData.audios[0];
        document.getElementById('vPlayBtn').style.display = 'block';
        var audio = new Audio('data:audio/wav;base64,' + lastTtsBase64);
        currentAudio = audio;
        audio.play().catch(function(){});
      }
    }).catch(function(){});
  }

  function voicePlayLastTts(){
    if (lastTtsBase64) {
      var audio = new Audio('data:audio/wav;base64,' + lastTtsBase64);
      currentAudio = audio;
      audio.play().catch(function(){});
    }
  }
})();
</script>
