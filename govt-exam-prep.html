<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Govt Exam Prep - Chat Prototype</title>
<!-- jbiq:v3.5.0:sunit1986 -->
<style>
@font-face { font-family: 'JioType'; font-weight: 400; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeVarW05-Regular.woff2') format('woff2'); }
@font-face { font-family: 'JioType'; font-weight: 500; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Medium.woff2') format('woff2'); }
@font-face { font-family: 'JioType'; font-weight: 700; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Bold.woff2') format('woff2'); }
@font-face { font-family: 'JioType'; font-weight: 900; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Black.woff2') format('woff2'); }

:root {
  --primary: #3535f3;
  --primary-light: #e8e8fc;
  --primary-dark: #3900ad;
  --secondary: #f7ab20;
  --sparkle: #1eccb0;
  --error: #fa2f40;
  --warning: #f06d0f;
  --success: #25ab21;
  --grey-100: #141414;
  --grey-80: #5c5c5c;
  --grey-60: #8f8f8f;
  --grey-40: #e0e0e0;
  --grey-20: #f5f5f5;
  --surface-ghost: #eeeeef;
  --surface-bold: #3900ad;
  --white: #ffffff;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 23px;
  --radius-pill: 999px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: 'JioType'; background: var(--white); display: flex; flex-direction: column; }

.phone-frame {
  width: 100%; height: 100%; background: var(--white);
  position: relative; overflow: hidden;
}

.notch { display: none; }
.notch-pill { display: none; }
.status-bar { display: none; }
.battery { display: none; }
.battery::after { display: none; }
.battery-fill { display: none; }

.chat-header {
  height: 56px; padding: 0 16px; display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--grey-40); background: var(--white); position: relative; z-index: 80;
}
.back-btn {
  width: 32px; height: 32px; border-radius: 50%; border: none; background: transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; color: var(--grey-100); flex-shrink: 0;
}
.back-btn:hover { background: var(--surface-ghost); }
.back-btn:active { transform: scale(0.9); }
.chat-header-avatar {
  width: 36px; height: 36px; border-radius: 50%; background: var(--primary);
  display: flex; align-items: center; justify-content: center;
}
.chat-header-info h3 { font-size: 16px; font-weight: 700; color: var(--grey-100); line-height: 1.2; }
.chat-header-info span { font-size: 12px; color: var(--success); font-weight: 500; }

.chat-body { display: flex; flex-direction: column; height: calc(100vh - 56px - 88px); }

.chat-area {
  flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 8px;
  display: flex; flex-direction: column; gap: 12px;
  scroll-behavior: smooth; background: var(--white);
}
.chat-area::-webkit-scrollbar { width: 0; }

.msg { max-width: 88%; animation: msgIn 0.35s ease-out; }
.msg-ai { align-self: flex-start; }
.msg-user { align-self: flex-end; }
.msg-wide { max-width: 96%; width: 96%; }

.bubble {
  padding: 12px 16px; font-size: 14px; line-height: 1.5; color: var(--grey-100);
  word-wrap: break-word;
}
.bubble-ai {
  background: var(--surface-ghost); border-radius: 4px var(--radius-lg) var(--radius-lg) var(--radius-lg);
}
.bubble-user {
  background: var(--primary); color: var(--white);
  border-radius: var(--radius-lg) 4px var(--radius-lg) var(--radius-lg);
}

.chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.chip {
  padding: 8px 16px; border-radius: var(--radius-pill); border: 1.5px solid var(--primary);
  color: var(--primary); font-size: 13px; font-weight: 700; cursor: pointer;
  background: var(--white); transition: all 0.2s;
}
.chip:hover, .chip:active { background: var(--primary); color: var(--white); }

/* Exam match cards */
.exam-card {
  border: 1.5px solid var(--grey-40); border-radius: var(--radius-lg); padding: 16px;
  margin-top: 8px; cursor: pointer; transition: all 0.2s; background: var(--white);
}
.exam-card:hover, .exam-card:active { border-color: var(--primary); background: var(--primary-light); }
.exam-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.exam-card-icon {
  width: 40px; height: 40px; border-radius: var(--radius-sm); display: flex;
  align-items: center; justify-content: center; background: var(--primary); color: var(--white);
}
.exam-match-badge {
  font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: var(--radius-pill);
  background: var(--sparkle); color: var(--white);
}
.exam-match-badge.mid { background: var(--secondary); }
.exam-card h4 { font-size: 16px; font-weight: 900; color: var(--grey-100); }
.exam-card p { font-size: 12px; color: var(--grey-60); margin-top: 2px; line-height: 1.4; }
.exam-card-footer { display: flex; align-items: center; gap: 4px; margin-top: 10px; font-size: 12px; font-weight: 700; color: var(--primary); }

/* Exam detail card */
.detail-card {
  background: var(--grey-100); border-radius: var(--radius-lg); padding: 16px; margin-top: 8px; color: var(--white);
}
.detail-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.detail-card-header svg { color: var(--sparkle); }
.detail-card-header span { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--sparkle); }
.detail-section { margin-top: 12px; }
.detail-section-title {
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
  color: var(--secondary); margin-bottom: 6px; display: flex; align-items: center; gap: 6px;
}
.detail-section-body {
  background: rgba(255,255,255,0.08); border-radius: var(--radius-sm); padding: 12px;
  font-size: 13px; line-height: 1.6; color: rgba(255,255,255,0.85);
  border: 1px solid rgba(255,255,255,0.1);
}
.detail-item { display: flex; align-items: flex-start; gap: 8px; padding: 4px 0; }
.detail-bullet { width: 6px; height: 6px; border-radius: 50%; background: var(--sparkle); flex-shrink: 0; margin-top: 6px; }

/* Quiz card widget */
.quiz-card {
  background: var(--white); border: 1.5px solid var(--grey-40); border-radius: var(--radius-lg);
  padding: 16px; margin-top: 8px; overflow: hidden;
}
.quiz-progress { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.quiz-progress-bar { flex: 1; height: 4px; background: var(--grey-40); border-radius: 99px; overflow: hidden; }
.quiz-progress-fill { height: 100%; background: var(--primary); border-radius: 99px; transition: width 0.4s ease; }
.quiz-progress-text { font-size: 11px; font-weight: 700; color: var(--grey-60); }
.quiz-question { font-size: 15px; font-weight: 700; color: var(--grey-100); line-height: 1.5; margin-bottom: 14px; }
.quiz-option {
  padding: 12px 14px; border-radius: var(--radius-md); border: 1.5px solid var(--grey-40);
  font-size: 14px; color: var(--grey-100); cursor: pointer; transition: all 0.2s;
  margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between;
  font-weight: 500;
}
.quiz-option:hover { border-color: var(--primary); background: var(--primary-light); }
.quiz-option.correct { border-color: var(--success); background: rgba(37,171,33,0.1); color: var(--success); font-weight: 700; }
.quiz-option.wrong { border-color: var(--error); background: rgba(250,47,64,0.1); color: var(--error); font-weight: 700; }
.quiz-option.disabled { pointer-events: none; opacity: 0.38; }
.quiz-explanation {
  margin-top: 12px; padding: 12px; border-radius: var(--radius-sm);
  font-size: 13px; line-height: 1.5; animation: msgIn 0.3s ease-out;
}
.quiz-explanation.is-correct { background: rgba(37,171,33,0.1); border: 1px solid rgba(37,171,33,0.25); color: var(--grey-100); }
.quiz-explanation.is-wrong { background: rgba(250,47,64,0.1); border: 1px solid rgba(250,47,64,0.25); color: var(--grey-100); }
.quiz-explanation-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.quiz-explanation-label.is-correct { color: var(--success); }
.quiz-explanation-label.is-wrong { color: var(--error); }
.quiz-next-btn {
  width: 100%; margin-top: 12px; padding: 12px; border-radius: var(--radius-md);
  background: var(--primary); color: var(--white); font-size: 14px; font-weight: 700;
  border: none; cursor: pointer; transition: all 0.2s; font-family: 'JioType';
}
.quiz-next-btn:active { transform: scale(0.97); }

/* Card navigation arrows */
.card-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
.card-nav-btn {
  width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid var(--grey-40);
  background: var(--white); display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s; color: var(--grey-100);
}
.card-nav-btn:hover { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
.card-nav-btn:active { transform: scale(0.9); }
.card-nav-btn.disabled { opacity: 0.38; pointer-events: none; }
.card-nav-dots { display: flex; gap: 6px; align-items: center; }
.card-nav-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--grey-40); transition: all 0.3s; }
.card-nav-dot.active { background: var(--primary); width: 18px; border-radius: 99px; }
.card-nav-dot.viewed:not(.active) { background: var(--success); }

/* Score card */
.score-card {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: var(--radius-lg); padding: 24px; margin-top: 8px; color: var(--white); text-align: center;
}
.score-icon { width: 64px; height: 64px; background: rgba(255,255,255,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
.score-title { font-size: 20px; font-weight: 900; margin-bottom: 4px; }
.score-number { font-size: 48px; font-weight: 900; margin: 8px 0; }
.score-number span { font-size: 24px; opacity: 0.6; }
.score-accuracy { font-size: 13px; opacity: 0.8; }

/* Flashcard */
.flashcard-container { margin-top: 8px; perspective: 1000px; width: 100%; }
.flashcard {
  width: 100%; height: 260px; position: relative; cursor: pointer;
  transition: transform 0.6s; transform-style: preserve-3d;
}
.flashcard.flipped { transform: rotateY(180deg); }
.flashcard-face {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  backface-visibility: hidden; border-radius: var(--radius-lg); padding: 24px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
}
.flashcard-front {
  background: var(--white); border: 1.5px solid var(--grey-40);
}
.flashcard-back {
  background: var(--primary); color: var(--white); transform: rotateY(180deg);
}
.flashcard-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
.flashcard-front .flashcard-label { color: var(--grey-60); }
.flashcard-back .flashcard-label { color: rgba(255,255,255,0.6); }
.flashcard-text { font-size: 16px; font-weight: 700; line-height: 1.5; }
.flashcard-front .flashcard-text { color: var(--grey-100); }
.flashcard-back .flashcard-text { color: var(--white); }
.flashcard-hint { font-size: 12px; color: var(--grey-60); margin-top: 16px; font-weight: 500; }
.flashcard-actions { display: flex; gap: 8px; margin-top: 10px; width: 100%; max-width: 100%; overflow: hidden; }
.flashcard-btn {
  flex: 1; padding: 10px 8px; border-radius: var(--radius-md); border: none;
  font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'JioType';
  transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 4px;
  min-width: 0; white-space: nowrap;
}
.flashcard-btn:active { transform: scale(0.97); }
.flashcard-btn-listen { background: rgba(255,255,255,0.2); color: var(--white); }
.flashcard-btn-listen:hover { background: rgba(255,255,255,0.3); }
.flashcard-btn-next { background: var(--white); color: var(--primary); }

/* Audio concept card */
.audio-card {
  background: var(--grey-100); border-radius: var(--radius-lg); padding: 20px; margin-top: 8px; color: var(--white);
}
.audio-card-icon { width: 48px; height: 48px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
.audio-card-icon.playing { animation: pulse 1.2s infinite; }
.audio-card-title { font-size: 20px; font-weight: 900; text-align: center; margin-bottom: 4px; }
.audio-card-sub { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--grey-60); text-align: center; margin-bottom: 16px; }
.audio-card-text { background: rgba(255,255,255,0.08); border-radius: var(--radius-sm); padding: 14px; font-size: 13px; line-height: 1.6; color: rgba(255,255,255,0.85); margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.1); }
.audio-play-btn {
  width: 100%; padding: 14px; border-radius: var(--radius-md); border: none;
  background: var(--primary); color: var(--white); font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: 'JioType'; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.audio-play-btn:active { transform: scale(0.97); }

/* Multi-modal chat input */
.input-widget {
  padding: 2px 12px 16px; background: var(--white); position: relative; z-index: 80;
}
.input-field-wrap {
  background: var(--surface-ghost); border-radius: var(--radius-xl); padding: 6px;
  display: flex; flex-direction: column;
}
.input-text-area { padding: 10px 8px; display: flex; align-items: center; }
.input-text-area input {
  font-family: 'JioType'; font-size: 14px; font-weight: 400; color: var(--grey-100);
  background: transparent; border: none; outline: none; width: 100%; line-height: 1.3;
}
.input-text-area input::placeholder { color: var(--grey-60); opacity: 0.65; }
.input-actions { display: flex; justify-content: space-between; align-items: center; height: 43px; }
.input-left-actions { display: flex; gap: 2px; }
.input-icon-btn {
  width: 36px; height: 36px; border-radius: var(--radius-pill);
  display: flex; align-items: center; justify-content: center;
  background: #e7e9ff; border: none; cursor: pointer;
}
.input-icon-btn:active { opacity: 0.7; }
.input-icon-btn svg { width: 20px; height: 20px; }
.speak-btn {
  background: var(--surface-bold); border: none; border-radius: var(--radius-pill);
  padding: 10px 20px; display: flex; align-items: center; gap: 8px; cursor: pointer;
}
.speak-btn:active { opacity: 0.85; }
.speak-btn svg { width: 18px; height: 18px; }
.speak-btn span { font-family: 'JioType'; font-weight: 700; font-size: 14px; color: var(--white); line-height: 1; }
.home-indicator { display: none; }

/* Typing indicator */
.typing { display: flex; gap: 4px; padding: 12px 16px; }
.typing-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--grey-60);
  animation: typingAnim 1.2s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

/* Skeleton loading */
.skeleton {
  background: linear-gradient(90deg, var(--grey-40) 25%, var(--surface-ghost) 50%, var(--grey-40) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: var(--radius-sm);
}
.skeleton-line { height: 14px; margin-bottom: 8px; }
.skeleton-line:last-child { width: 60%; }

/* Listen button */
.listen-btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px;
  border-radius: var(--radius-pill); background: var(--primary);
  border: 1px solid var(--primary); color: var(--white); font-size: 11px;
  font-weight: 700; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.5px;
  font-family: 'JioType';
}
.listen-btn:hover { background: var(--primary-dark); }

/* Milestone card */
.milestone-card {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: var(--radius-lg); padding: 20px; margin-top: 8px; color: var(--white); text-align: center;
}
.milestone-icon { width: 56px; height: 56px; background: rgba(255,255,255,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; }
.milestone-title { font-size: 18px; font-weight: 900; margin-bottom: 4px; }
.milestone-sub { font-size: 13px; opacity: 0.8; }

@keyframes msgIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes typingAnim { 0%, 100% { opacity: 0.3; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-4px); } }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
@keyframes shimmer { to { background-position: -200% 0; } }
</style>
</head>

<div class="phone-frame">
  <div class="chat-header">
    <button class="back-btn" onclick="window.location.href='career.html'">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19 11H7.83l4.88-4.88a1.008 1.008 0 00-1.42-1.42l-6.59 6.59a1 1 0 000 1.42l6.59 6.59a1.002 1.002 0 001.639-.325 1 1 0 00-.22-1.095L7.83 13H19a1 1 0 000-2z"/></svg>
    </button>
    <div class="chat-header-avatar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M12 2a1 1 0 00-1 1v18a1 1 0 002 0V3a1 1 0 00-1-1zM4 9a1 1 0 00-1 1v4a1 1 0 102 0v-4a1 1 0 00-1-1zm4-3a1 1 0 00-1 1v10a1 1 0 102 0V7a1 1 0 00-1-1zm12 3a1 1 0 00-1 1v4a1 1 0 002 0v-4a1 1 0 00-1-1zm-4-3a1 1 0 00-1 1v10a1 1 0 002 0V7a1 1 0 00-1-1z"/></svg>
    </div>
    <div class="chat-header-info">
      <h3>Govt Exam Prep Coach</h3>
      <span>Online</span>
    </div>
  </div>

  <div class="chat-body">
    <div class="chat-area" id="chatArea"></div>
    <div class="input-widget">
      <div class="input-field-wrap">
        <div class="input-text-area">
          <input type="text" id="inputField" placeholder="Ask anything..." readonly>
        </div>
        <div class="input-actions">
          <div class="input-left-actions">
            <button class="input-icon-btn" aria-label="Add" id="micBtn">
              <svg viewBox="0 0 24 24" fill="#170054"><path d="M20 11h-7V4a1 1 0 00-2 0v7H4a1 1 0 000 2h7v7a1 1 0 002 0v-7h7a1 1 0 000-2z"/></svg>
            </button>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <button class="input-icon-btn" aria-label="Mic">
              <svg viewBox="0 0 24 24" fill="#170054"><path d="M12 15a3 3 0 003-3V5a3 3 0 00-6 0v7a3 3 0 003 3zm6-5a1 1 0 00-1 1v1a5 5 0 11-10 0v-1a1 1 0 10-2 0v1a7 7 0 1014 0v-1a1 1 0 00-1-1z"/></svg>
            </button>
            <button class="speak-btn" id="sendBtn">
              <svg viewBox="0 0 24 24" fill="white"><path d="M12 15a3 3 0 003-3V5a3 3 0 00-6 0v7a3 3 0 003 3zm6-5a1 1 0 00-1 1v1a5 5 0 11-10 0v-1a1 1 0 10-2 0v1a7 7 0 1014 0v-1a1 1 0 00-1-1z"/></svg>
              <span>Speak</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// === Icons ===
const ICONS = {
  mic: '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 15a3 3 0 003-3V5a3 3 0 00-6 0v7a3 3 0 003 3zm6-5a1 1 0 00-1 1v1a5 5 0 11-10 0v-1a1 1 0 10-2 0v1a7 7 0 1014 0v-1a1 1 0 00-1-1zm-3 10H9a1 1 0 000 2h6a1 1 0 000-2z"/></svg>',
  play: '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19.15 10.36l-10-7A2 2 0 008 3a1.88 1.88 0 00-.92.23A2 2 0 006 5v14a2 2 0 001.08 1.77c.282.154.599.233.92.23a2 2 0 001.15-.36l10-7a2 2 0 000-3.28z"/></svg>',

// === Sarvam AI Text-to-Speech Engine ===
const SARVAM_API_KEY = 'sk_bjco0jfw_u9VUpaliZT6cAoT7EgaRxAks';
const SARVAM_TTS_URL = 'https://api.sarvam.ai/text-to-speech';
const SARVAM_SPEAKER = 'amelia';
const ttsCache = new Map();
let currentAudio = null;

async function sarvamTTS(text, pace = 1.0) {
  const cacheKey = text + '|' + pace;
  if (ttsCache.has(cacheKey)) {
    const audio = new Audio(ttsCache.get(cacheKey));
    if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
    currentAudio = audio;
    audio.play().catch(() => {});
    return;
  }
  try {
    const res = await fetch(SARVAM_TTS_URL, {
      method: 'POST',
      headers: { 'api-subscription-key': SARVAM_API_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        inputs: [text],
        target_language_code: 'en-IN',
        speaker: SARVAM_SPEAKER,
        model: 'bulbul:v3',
        pace: pace
      })
    });
    const data = await res.json();
    if (data.audios && data.audios[0]) {
      const dataUrl = 'data:audio/wav;base64,' + data.audios[0];
      ttsCache.set(cacheKey, dataUrl);
      const audio = new Audio(dataUrl);
      if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
      currentAudio = audio;
      audio.play().catch(() => {});
    }
  } catch (e) {
    console.warn('Sarvam TTS failed:', e);
  }
}

const chatArea = document.getElementById('chatArea');
const inputField = document.getElementById('inputField');
const sendBtn = document.getElementById('sendBtn');

function scrollDown() {
  setTimeout(() => { chatArea.scrollTop = chatArea.scrollHeight; }, 60);
}

function addMsg(role, html) {
  const div = document.createElement('div');
  div.className = `msg msg-${role}`;
  div.innerHTML = `<div class="bubble bubble-${role}">${html}</div>`;
  chatArea.appendChild(div);
  scrollDown();
}

function addUserMsg(text) {
  addMsg('user', text);
}

function addAiMsg(html) {
  addMsg('ai', html);
}

function addRichAi(html, wide) {
  const div = document.createElement('div');
  div.className = 'msg msg-ai' + (wide ? ' msg-wide' : '');
  div.innerHTML = html;
  div.style.animation = 'msgIn 0.35s ease-out';
  chatArea.appendChild(div);
  scrollDown();
}

function addChips(chips) {
  const div = document.createElement('div');
  div.className = 'msg msg-ai';
  div.innerHTML = `<div class="chips">${chips.map(c =>
    `<button class="chip" onclick="handleChip('${c.action}', this)">${c.label}</button>`
  ).join('')}</div>`;
  chatArea.appendChild(div);
  scrollDown();
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg msg-ai';
  div.id = 'typingIndicator';
  div.innerHTML = `<div class="bubble bubble-ai"><div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
  chatArea.appendChild(div);
  scrollDown();
}

function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function showSkeleton() {
  const div = document.createElement('div');
  div.className = 'msg msg-ai';
  div.id = 'skeletonLoader';
  div.innerHTML = `<div class="bubble bubble-ai"><div class="skeleton skeleton-line" style="width:90%"></div><div class="skeleton skeleton-line" style="width:70%"></div><div class="skeleton skeleton-line" style="width:50%"></div></div>`;
  chatArea.appendChild(div);
  scrollDown();
}

function hideSkeleton() {
  const el = document.getElementById('skeletonLoader');
  if (el) el.remove();
}

function disableAllChips() {
  chatArea.querySelectorAll('.chip').forEach(c => {
    c.style.pointerEvents = 'none';
    c.style.opacity = '0.38';
  });
}

        <div class="detail-card-header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="var(--sparkle)"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm4 18H6V4h7v5h5v11zM8 14h8v2H8v-2zm0 4h6v2H8v-2z"/></svg>
          <span>SSC CGL - Exam Pattern</span>
        </div>
        <div class="detail-section-body" style="margin-top:8px">
          <div class="detail-item"><div class="detail-bullet"></div><span><b>Tier 1 (CBE):</b> GK, Reasoning, Quant, English - 200 marks, 60 min</span></div>
          <div class="detail-item"><div class="detail-bullet"></div><span><b>Tier 2 (CBE):</b> Quant, English, GK - 390 marks, 2 hours 15 min</span></div>
          <div class="detail-item"><div class="detail-bullet"></div><span><b>Tier 3:</b> Descriptive Paper (Essay, Letter) - 100 marks</span></div>

// ==========================
// JOURNEY 2: Mock Quiz
// ==========================

function startMockQuiz() {
  addUserMsg("Practice GK Quiz");
  quizState = { current: 0, score: 0, answers: [] };
  showTyping();
  setTimeout(() => {
    hideTyping();
    addAiMsg("Let's test your General Knowledge! Here's a 5-question mock on Geography, Polity & Science. Use the arrows to navigate.");
    setTimeout(() => {
      renderQuizWidget();
    }, 400);
  }, 800);
}

function renderQuizWidget() {
  addRichAi(`<div class="quiz-card" id="quizWidget"></div>`, true);
  updateQuizView(0);
}

function updateQuizView(index) {
  quizState.current = index;
  const q = QUIZ_QUESTIONS[index];
  const progress = ((index) / QUIZ_QUESTIONS.length * 100);
  const answered = quizState.answers[index];
  const widget = document.getElementById('quizWidget');
  if (!widget) return;

  let optionsHtml = q.options.map((opt, i) => {
    let cls = 'quiz-option';
    let extra = '';
    if (answered !== undefined) {
      if (i === q.correct) { cls += ' correct'; extra = '<span style="color:var(--success);margin-left:auto">' + ICONS.success + '</span>'; }
      else if (i === answered && i !== q.correct) { cls += ' wrong'; }
      else { cls += ' disabled'; }
    }
    const clickable = answered === undefined ? `onclick="answerQuiz(${index}, ${i}, this)"` : '';
    return `<div class="${cls}" ${clickable}>${opt} ${extra}</div>`;
  }).join('');

  let explanationHtml = '';
  if (answered !== undefined) {
    const isCorrect = answered === q.correct;
    explanationHtml = `<div class="quiz-explanation ${isCorrect ? 'is-correct' : 'is-wrong'}">
      <div class="quiz-explanation-label ${isCorrect ? 'is-correct' : 'is-wrong'}">${isCorrect ? 'Correct' : 'Incorrect'}</div>
      <div>${q.explanation}</div>
    </div>`;
  }

  const allAnswered = quizState.answers.length === QUIZ_QUESTIONS.length && quizState.answers.every(a => a !== undefined);

  widget.innerHTML = `
    <div class="quiz-progress">
      <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${progress}%"></div></div>
      <div class="quiz-progress-text">${index + 1}/${QUIZ_QUESTIONS.length}</div>
    </div>
    <div class="quiz-question">${q.question}</div>
    ${optionsHtml}
    ${explanationHtml}
    <div class="card-nav">
      <button class="card-nav-btn ${index === 0 ? 'disabled' : ''}" onclick="updateQuizView(${index - 1})">${ICONS.chevLeft}</button>
      <div class="card-nav-dots">${QUIZ_QUESTIONS.map((_, i) => `<div class="card-nav-dot ${i === index ? 'active' : ''}" ${quizState.answers[i] !== undefined ? 'style="background:var(--success)"' : ''}></div>`).join('')}</div>
      ${allAnswered ?
        `<button class="card-nav-btn" style="background:var(--primary);color:var(--white);border-color:var(--primary);width:auto;padding:0 12px;border-radius:var(--radius-pill);font-size:12px;font-weight:700;font-family:'JioType'" onclick="showQuizResults()">Results</button>` :
        `<button class="card-nav-btn ${index === QUIZ_QUESTIONS.length - 1 ? 'disabled' : ''}" onclick="updateQuizView(${index + 1})">${ICONS.chevRight}</button>`
      }
    </div>
  `;
  scrollDown();
}

function answerQuiz(qIndex, optIndex, el) {
  quizState.answers[qIndex] = optIndex;
  if (optIndex === QUIZ_QUESTIONS[qIndex].correct) quizState.score++;
  updateQuizView(qIndex);
}

function showQuizResults() {
  const score = quizState.score;
  const total = QUIZ_QUESTIONS.length;
  const pct = Math.round((score / total) * 100);

  addRichAi(`
    <div class="score-card">
      <div class="score-icon">${ICONS.trophy}</div>
      <div class="score-title">Mock Finished!</div>
      <div class="score-number">${score}<span>/${total}</span></div>
      <div class="score-accuracy">Accuracy: ${pct}%</div>
    </div>
  `);

  setTimeout(() => {
    if (pct >= 60) {
      addAiMsg("Good job, Deepak! Keep up the practice. Want to review some concepts or try again?");
    } else {
      addAiMsg("Don't worry, Deepak. Every attempt is progress. Let's strengthen your basics with some flashcards!");
    }
    addChips([
      { label: "Try Again", action: "quiz_again" },
      { label: "Study Polity Flashcards", action: "flashcards" },
      { label: "Listen to a Concept", action: "audio_concept" },
      { label: "Start over", action: "start_over" }
    ]);
  }, 600);
}

// ==========================
// JOURNEY 3: Flashcards
// ==========================

function startFlashcards() {
  addUserMsg("Study Polity Flashcards");
  flashcardState = { current: 0, flipped: [] };
  showTyping();
  setTimeout(() => {
    hideTyping();
    addAiMsg("Here's your Indian Polity review! Tap the card to reveal the answer. Use arrows to navigate between cards.");
    setTimeout(() => { renderFlashcardWidget(); }, 400);
  }, 800);
}

function renderFlashcardWidget() {
  addRichAi(`<div class="flashcard-container" id="flashcardWidget"></div>`, true);
  updateFlashcardView(0);
}

function updateFlashcardView(index) {
  flashcardState.current = index;
  const card = FLASHCARDS[index];
  const isFlipped = flashcardState.flipped[index];
  const widget = document.getElementById('flashcardWidget');
  if (!widget) return;

  const allViewed = flashcardState.flipped.filter(Boolean).length === FLASHCARDS.length;

  widget.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <span style="font-size:11px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:1px;">Indian Polity</span>
      <span style="font-size:11px;font-weight:700;color:var(--grey-60);">Card ${index+1}/${FLASHCARDS.length}</span>
    </div>
    <div class="flashcard ${isFlipped ? 'flipped' : ''}" id="fcWidget_card" onclick="flipFlashcardWidget(${index})">
      <div class="flashcard-face flashcard-front">
        <div class="flashcard-label">Question</div>
        <div class="flashcard-text">${card.q}</div>
        <div class="flashcard-hint">Tap to reveal answer</div>
      </div>
      <div class="flashcard-face flashcard-back">
        <div class="flashcard-label">Answer</div>
        <div class="flashcard-text">${card.a}</div>
        <div class="flashcard-actions">
          <button class="flashcard-btn flashcard-btn-listen" onclick="event.stopPropagation(); listenFlashcard('${card.a.replace(/'/g, "\\'")}')">
            ${ICONS.volume} Listen
          </button>
        </div>
      </div>
    </div>
    <div class="card-nav">
      <button class="card-nav-btn ${index === 0 ? 'disabled' : ''}" onclick="updateFlashcardView(${index - 1})">${ICONS.chevLeft}</button>
      <div class="card-nav-dots">
        ${FLASHCARDS.map((_, i) => `<div class="card-nav-dot ${i === index ? 'active' : ''} ${flashcardState.flipped[i] ? 'viewed' : ''}"></div>`).join('')}
      </div>
      ${index === FLASHCARDS.length - 1 ?
        `<button class="card-nav-btn" style="width:auto;padding:0 12px;border-radius:99px;font-size:12px;font-weight:700;background:var(--primary);color:var(--white);border-color:var(--primary);" onclick="finishFlashcards()">End</button>` :
        `<button class="card-nav-btn" onclick="updateFlashcardView(${index + 1})">${ICONS.chevRight}</button>`
      }
    </div>`;
  scrollDown();
}

function flipFlashcardWidget(index) {
  flashcardState.flipped[index] = !flashcardState.flipped[index];
  updateFlashcardView(index);
}

function listenFlashcard(text) {
  sarvamTTS(text, 1.15);
}

function finishFlashcards() {
  addRichAi(`
    <div class="milestone-card">
      <div class="milestone-icon">${ICONS.success}</div>
      <div class="milestone-title">Flashcards Complete!</div>
      <div class="milestone-sub">You reviewed all ${FLASHCARDS.length} Indian Polity cards. Great revision!</div>
    </div>
  `);
  setTimeout(() => {
    addAiMsg("Well done, Deepak! Want to test what you learned with a quiz, or listen to a concept explanation?");
    addChips([
      { label: "Practice GK Quiz", action: "mock_quiz" },
      { label: "Listen to a Concept", action: "audio_concept" },
      { label: "Start over", action: "start_over" }
    ]);
  }, 600);
}

// ==========================
// Audio Concept
// ==========================

function startAudioConcept() {
  addUserMsg("Listen to a Concept");
  showTyping();
  setTimeout(() => {
    hideTyping();
    addAiMsg("Here's a micro-concept on Fiscal Policy. You can read and listen to it.");
    setTimeout(() => {
      addRichAi(`
        <div class="audio-card">
          <div class="audio-card-icon" id="audioIcon">${ICONS.volume}</div>
          <div class="audio-card-title">Fiscal Deficit</div>
          <div class="audio-card-sub">Economy - Micro Concept</div>
          <div class="audio-card-text">
            Fiscal deficit is the difference between the government's total expenditure and its total revenue (excluding borrowings). It indicates how much the government needs to borrow to meet its expenses. A high fiscal deficit can lead to inflation and increased debt burden.
          </div>
          <button class="audio-play-btn" onclick="playAudioConcept(this)">
            ${ICONS.play} Listen to Explanation
          </button>
        </div>
      `);
      setTimeout(() => {
        addChips([
          { label: "Practice GK Quiz", action: "mock_quiz" },
          { label: "Study Polity Flashcards", action: "flashcards" },
          { label: "Start over", action: "start_over" }
        ]);
      }, 300);
    }, 400);
  }, 800);
}

function playAudioConcept(btn) {
  const icon = document.getElementById('audioIcon');
  if (icon) icon.classList.add('playing');
  btn.innerHTML = '<span style="display:flex;align-items:center;gap:8px;"><svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 18a8 8 0 110-16 8 8 0 010 16z"/></svg> Playing...</span>';
  btn.style.pointerEvents = 'none';

  sarvamTTS("Fiscal deficit is the difference between the government's total expenditure and its total revenue, excluding borrowings. It indicates how much the government needs to borrow to meet its expenses. A high fiscal deficit can lead to inflation and increased debt burden.", 1.15);

  // Reset after ~15 seconds
  setTimeout(() => {
    if (icon) icon.classList.remove('playing');
    btn.innerHTML = ICONS.play + ' Listen Again';
    btn.style.pointerEvents = 'auto';
  }, 15000);
}

// === Preload TTS ===
function preloadTTS() {
  const text = "Fiscal deficit is the difference between the government's total expenditure and its total revenue, excluding borrowings. It indicates how much the government needs to borrow to meet its expenses. A high fiscal deficit can lead to inflation and increased debt burden.";
  const pace = 1.15;
  const cacheKey = text + '|' + pace;
  if (ttsCache.has(cacheKey)) return;
  fetch(SARVAM_TTS_URL, {
    method: 'POST',
    headers: { 'api-subscription-key': SARVAM_API_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ inputs: [text], target_language_code: 'en-IN', speaker: SARVAM_SPEAKER, model: 'bulbul:v3', pace })
  }).then(r => r.json()).then(data => {
    if (data.audios && data.audios[0]) ttsCache.set(cacheKey, 'data:audio/wav;base64,' + data.audios[0]);
  }).catch(() => {});
}

// === Init ===
function init() {
  addAiMsg("Namaste Deepak! I'm your Govt Exam Prep Coach. I can help you discover the right government exam, practice with mock quizzes, or review concepts with flashcards.");
  setTimeout(() => {
    addAiMsg("What would you like to do today?");
    showEntryChips();
  }, 500);
  preloadTTS();
}

init();
</script>
