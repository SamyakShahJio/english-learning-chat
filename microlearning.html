<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microlearning - Chat Prototype</title>
<!-- jbiq:v3.5.0:sunit1986 -->
<style>
@font-face { font-family: 'JioType'; font-weight: 400; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeVarW05-Regular.woff2') format('woff2'); }
@font-face { font-family: 'JioType'; font-weight: 500; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Medium.woff2') format('woff2'); }
@font-face { font-family: 'JioType'; font-weight: 700; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Bold.woff2') format('woff2'); }
@font-face { font-family: 'JioType'; font-weight: 900; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Black.woff2') format('woff2'); }

:root {
  --primary: #3535f3;
  --primary-light: #e8e8fc;
  --primary-dark: #3900ad;
  --secondary: #f7ab20;
  --sparkle: #1eccb0;
  --error: #fa2f40;
  --warning: #f06d0f;
  --success: #25ab21;
  --grey-100: #141414;
  --grey-80: #5c5c5c;
  --grey-60: #8f8f8f;
  --grey-40: #e0e0e0;
  --grey-20: #f5f5f5;
  --surface-ghost: #eeeeef;
  --surface-bold: #3900ad;
  --white: #ffffff;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 23px;
  --radius-pill: 999px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'JioType'; background: var(--grey-20); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px; }

.phone-frame {
  width: 100%; max-width: 420px; height: 900px; background: var(--white);
  border-radius: 54px; border: 12px solid var(--grey-100);
  position: relative; overflow: hidden; box-shadow: 0 60px 120px -30px rgba(0,0,0,0.3);
}

.notch {
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 150px; height: 34px; background: var(--grey-100);
  border-radius: 0 0 24px 24px; z-index: 100;
}
.notch-pill { width: 50px; height: 5px; background: rgba(255,255,255,0.1); border-radius: 99px; position: absolute; top: 14px; left: 50%; transform: translateX(-50%); }

.status-bar {
  height: 50px; padding: 0 28px; display: flex; justify-content: space-between; align-items: center;
  position: relative; z-index: 90; font-size: 14px; font-weight: 700; color: var(--grey-100);
}
.battery { width: 28px; height: 14px; border: 2px solid var(--grey-60); border-radius: 4px; position: relative; }
.battery::after { content: ''; position: absolute; right: -5px; top: 3px; width: 3px; height: 6px; background: var(--grey-60); border-radius: 0 2px 2px 0; }
.battery-fill { width: 70%; height: 100%; background: var(--grey-100); border-radius: 2px; }

.chat-header {
  height: 56px; padding: 0 16px; display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--grey-40); background: var(--white); position: relative; z-index: 80;
}
.chat-header-avatar {
  width: 36px; height: 36px; border-radius: 50%; background: var(--primary);
  display: flex; align-items: center; justify-content: center;
}
.chat-header-info h3 { font-size: 16px; font-weight: 700; color: var(--grey-100); line-height: 1.2; }
.chat-header-info span { font-size: 12px; color: var(--success); font-weight: 500; }

.chat-area {
  flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 8px;
  display: flex; flex-direction: column; gap: 12px;
  scroll-behavior: smooth; background: var(--white);
}
.chat-area::-webkit-scrollbar { width: 0; }
.chat-body { display: flex; flex-direction: column; height: calc(900px - 50px - 56px - 68px); }

.msg { max-width: 88%; animation: msgIn 0.35s ease-out; }
.msg-ai { align-self: flex-start; }
.msg-user { align-self: flex-end; }
.msg-full { max-width: 100%; }

.bubble {
  padding: 12px 16px; font-size: 14px; line-height: 1.5; color: var(--grey-100);
  word-wrap: break-word;
}
.bubble-ai {
  background: var(--surface-ghost); border-radius: 4px var(--radius-lg) var(--radius-lg) var(--radius-lg);
}
.bubble-user {
  background: var(--primary); color: var(--white);
  border-radius: var(--radius-lg) 4px var(--radius-lg) var(--radius-lg);
}

.chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.chip {
  padding: 8px 16px; border-radius: var(--radius-pill); border: 1.5px solid var(--primary);
  color: var(--primary); font-size: 13px; font-weight: 700; cursor: pointer;
  background: var(--white); transition: all 0.2s;
}
.chip:hover, .chip:active { background: var(--primary); color: var(--white); }
.chip-disabled {
  border-color: var(--grey-40); color: var(--grey-60); cursor: default; opacity: 0.38;
}
.chip-disabled:hover, .chip-disabled:active { background: var(--white); color: var(--grey-60); }

/* Progress bar */
.progress-bar-container {
  background: var(--grey-40); border-radius: var(--radius-pill); height: 6px;
  width: 100%; margin-top: 8px; overflow: hidden;
}
.progress-bar-fill {
  height: 100%; background: var(--primary); border-radius: var(--radius-pill);
  transition: width 0.5s ease;
}

/* Concept card */
.concept-card {
  background: var(--grey-100); border-radius: var(--radius-lg); overflow: hidden;
  color: var(--white); margin-top: 8px;
}
.concept-card-img {
  width: 100%; height: 140px; object-fit: cover; display: block; opacity: 0.8;
}
.concept-card-body { padding: 16px; }
.concept-card-tag {
  display: inline-block; padding: 3px 10px; border-radius: var(--radius-pill);
  background: var(--primary); color: var(--white); font-size: 10px;
  font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
}
.concept-card h4 { font-size: 18px; font-weight: 900; margin-bottom: 6px; }
.concept-card p { font-size: 13px; color: rgba(255,255,255,0.7); line-height: 1.5; }

/* Roadmap card */
.roadmap-card {
  background: var(--white); border: 1px solid var(--grey-40); border-radius: var(--radius-lg);
  padding: 16px; margin-top: 8px;
}
.roadmap-card h4 { font-size: 16px; font-weight: 900; color: var(--grey-100); margin-bottom: 4px; }
.roadmap-card .roadmap-sub { font-size: 12px; color: var(--grey-60); margin-bottom: 16px; }
.roadmap-step {
  display: flex; align-items: center; gap: 12px; padding: 10px 12px;
  border-radius: var(--radius-md); margin-bottom: 6px; transition: all 0.2s;
}
.roadmap-step.active { background: var(--primary); }
.roadmap-step.locked { background: var(--surface-ghost); }
.roadmap-num {
  width: 28px; height: 28px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0;
}
.roadmap-step.active .roadmap-num { background: var(--white); color: var(--primary); }
.roadmap-step.locked .roadmap-num { background: var(--grey-40); color: var(--grey-60); }
.roadmap-step-text h5 { font-size: 13px; font-weight: 700; }
.roadmap-step-text p { font-size: 10px; }
.roadmap-step.active .roadmap-step-text h5 { color: var(--white); }
.roadmap-step.active .roadmap-step-text p { color: rgba(255,255,255,0.7); }
.roadmap-step.locked .roadmap-step-text h5 { color: var(--grey-80); }
.roadmap-step.locked .roadmap-step-text p { color: var(--grey-60); }
.roadmap-step-icon { margin-left: auto; }
.roadmap-step.active .roadmap-step-icon { color: var(--white); }
.roadmap-step.locked .roadmap-step-icon { color: var(--grey-60); }

/* Compare card */
.compare-card {
  background: var(--white); border: 1px solid var(--grey-40); border-radius: var(--radius-lg);
  padding: 16px; margin-top: 8px;
}
.compare-card h4 { font-size: 16px; font-weight: 900; color: var(--grey-100); margin-bottom: 4px; }
.compare-card .compare-sub { font-size: 12px; color: var(--grey-60); margin-bottom: 16px; }
.compare-item { margin-bottom: 16px; }
.compare-label {
  display: inline-block; padding: 3px 10px; border-radius: var(--radius-pill);
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 6px;
}
.compare-label.bad { background: rgba(250,47,64,0.1); color: var(--error); }
.compare-label.good { background: rgba(37,171,33,0.1); color: var(--success); }
.compare-img {
  width: 100%; height: 100px; object-fit: cover; border-radius: var(--radius-md);
  display: block;
}
.compare-item.bad .compare-img { opacity: 0.6; border: 2px solid rgba(250,47,64,0.3); }
.compare-item.good .compare-img { border: 2px solid var(--success); }
.compare-reason {
  display: flex; align-items: flex-start; gap: 6px; margin-top: 6px; font-size: 12px;
}
.compare-reason.bad { color: var(--error); }
.compare-reason.good { color: var(--success); font-weight: 700; }

/* Create form card */
.create-card {
  background: var(--white); border: 1px solid var(--grey-40); border-radius: var(--radius-lg);
  padding: 16px; margin-top: 8px;
}
.create-card h4 { font-size: 16px; font-weight: 900; color: var(--grey-100); margin-bottom: 4px; }
.create-card .create-sub { font-size: 12px; color: var(--grey-60); margin-bottom: 16px; }
.create-label { font-size: 10px; font-weight: 700; color: var(--grey-60); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.create-input {
  width: 100%; padding: 10px 14px; border-radius: var(--radius-md); border: 1.5px solid var(--grey-40);
  font-family: 'JioType'; font-size: 14px; color: var(--grey-100); background: var(--surface-ghost);
  outline: none; transition: border-color 0.2s; margin-bottom: 12px;
}
.create-input:focus { border-color: var(--primary); }
.create-input::placeholder { color: var(--grey-60); }
.create-select {
  width: 100%; padding: 10px 14px; border-radius: var(--radius-md); border: 1.5px solid var(--grey-40);
  font-family: 'JioType'; font-size: 14px; color: var(--grey-100); background: var(--surface-ghost);
  outline: none; margin-bottom: 12px; -webkit-appearance: none;
}
.create-row { display: flex; gap: 8px; }
.create-row > div { flex: 1; }
.create-btn {
  width: 100%; padding: 12px; border-radius: var(--radius-xl); border: none;
  background: var(--primary); color: var(--white); font-family: 'JioType';
  font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.create-btn:active { transform: scale(0.98); }
.create-btn:disabled { background: var(--grey-40); color: var(--grey-60); cursor: default; }

/* Result card */
.result-card {
  border-radius: var(--radius-lg); overflow: hidden; margin-top: 8px;
  position: relative;
}
.result-card img { width: 100%; height: 200px; object-fit: cover; display: block; }
.result-overlay {
  position: absolute; bottom: 0; left: 0; right: 0; padding: 20px;
  background: linear-gradient(transparent, rgba(0,0,0,0.8));
}
.result-overlay h3 {
  font-size: 22px; font-weight: 900; color: var(--white); text-transform: uppercase;
  font-style: italic; letter-spacing: -0.5px; line-height: 1.1;
}

/* Quality check card */
.quality-card {
  background: var(--white); border: 1px solid var(--grey-40); border-radius: var(--radius-lg);
  padding: 16px; margin-top: 8px;
}
.quality-card h4 { font-size: 16px; font-weight: 900; color: var(--grey-100); margin-bottom: 12px; }
.quality-check {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px; background: var(--surface-ghost); border-radius: var(--radius-md);
  margin-bottom: 6px; font-size: 13px; font-weight: 500; color: var(--grey-80);
}
.quality-check .qc-status { display: flex; align-items: center; }
.quality-check .qc-status.pending { color: var(--grey-60); }
.quality-check .qc-status.pass { color: var(--success); }
.quality-result {
  margin-top: 12px; padding: 12px; border-radius: var(--radius-md);
  background: rgba(37,171,33,0.08); border: 1px solid rgba(37,171,33,0.2);
  text-align: center; font-size: 13px; font-weight: 700; color: var(--success);
}

/* Anchor card */
.anchor-card {
  background: var(--grey-100); border-radius: var(--radius-lg); padding: 20px;
  color: var(--white); margin-top: 8px; position: relative; overflow: hidden;
}
.anchor-card::before {
  content: ''; position: absolute; top: -20px; right: -20px; width: 120px; height: 120px;
  background: var(--primary); border-radius: 50%; opacity: 0.2; filter: blur(30px);
}
.anchor-card h4 { font-size: 18px; font-weight: 900; margin-bottom: 8px; position: relative; }
.anchor-card p { font-size: 13px; color: rgba(255,255,255,0.7); line-height: 1.5; margin-bottom: 16px; position: relative; }
.anchor-skill {
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-md); padding: 12px; position: relative;
}
.anchor-skill-label { font-size: 10px; font-weight: 700; color: var(--sparkle); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.anchor-skill-text { font-size: 13px; font-weight: 500; color: var(--white); }

/* Complete card */
.complete-card {
  background: var(--white); border: 1px solid var(--grey-40); border-radius: var(--radius-lg);
  padding: 24px; margin-top: 8px; text-align: center; position: relative; overflow: hidden;
}
.complete-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--success), var(--primary), var(--secondary));
}
.complete-icon {
  width: 64px; height: 64px; border-radius: 50%; background: var(--secondary);
  display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;
  box-shadow: 0 8px 24px rgba(247,171,32,0.3);
}
.complete-card h3 { font-size: 22px; font-weight: 900; color: var(--grey-100); margin-bottom: 4px; }
.complete-card .complete-sub { font-size: 13px; color: var(--grey-60); margin-bottom: 20px; }

.plan-card {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: var(--radius-lg); padding: 20px; color: var(--white); text-align: left;
}
.plan-card-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.6); margin-bottom: 4px; }
.plan-card h4 { font-size: 18px; font-weight: 900; margin-bottom: 8px; }
.plan-card p { font-size: 12px; color: rgba(255,255,255,0.7); line-height: 1.5; margin-bottom: 16px; }
.plan-cta {
  width: 100%; padding: 12px; border-radius: var(--radius-md); border: none;
  background: var(--white); color: var(--primary); font-family: 'JioType';
  font-size: 14px; font-weight: 900; cursor: pointer; display: flex;
  align-items: center; justify-content: center; gap: 8px;
}
.plan-cta:active { transform: scale(0.98); }

/* Listen button */
.listen-btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px;
  border-radius: var(--radius-pill); background: var(--primary);
  border: 1px solid var(--primary); color: var(--white); font-size: 11px;
  font-weight: 700; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.5px;
}
.listen-btn:hover { background: var(--primary-dark); }
.listen-btn-dark {
  background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3);
}
.listen-btn-dark:hover { background: rgba(255,255,255,0.25); }

/* Input bar */
.input-bar {
  height: 68px; padding: 10px 12px; display: flex; align-items: center; gap: 8px;
  border-top: 1px solid var(--grey-40); background: var(--white); position: relative; z-index: 80;
}
.input-field {
  flex: 1; height: 44px; border-radius: var(--radius-xl); background: var(--surface-ghost);
  border: none; padding: 0 16px; font-family: 'JioType'; font-size: 14px; color: var(--grey-100);
  outline: none;
}
.input-field::placeholder { color: var(--grey-60); }
.send-btn {
  width: 44px; height: 44px; border-radius: 50%; background: var(--primary); border: none;
  display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s;
}
.send-btn:active { transform: scale(0.9); }
.mic-input-btn {
  width: 44px; height: 44px; border-radius: 50%; background: var(--surface-ghost); border: none;
  display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s;
}

.home-indicator {
  position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
  width: 120px; height: 4px; background: var(--grey-40); border-radius: 99px; z-index: 100;
}

/* Typing indicator */
.typing { display: flex; gap: 4px; padding: 12px 16px; }
.typing-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--grey-60);
  animation: typingAnim 1.2s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

/* Skeleton loading */
.skeleton {
  background: linear-gradient(90deg, var(--surface-ghost) 25%, var(--grey-40) 50%, var(--surface-ghost) 75%);
  background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: var(--radius-sm);
}
.skeleton-line { height: 14px; margin-bottom: 8px; }
.skeleton-line:last-child { width: 60%; }

/* Animations */
@keyframes msgIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(250,47,64,0.4); } 50% { box-shadow: 0 0 0 16px rgba(250,47,64,0); } }
@keyframes typingAnim { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1); } }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
@keyframes spinAnim { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.hidden { display: none !important; }
.fade-in { animation: msgIn 0.4s ease-out; }
</style>
</head>
<body>

<div class="phone-frame">
  <div class="notch"><div class="notch-pill"></div></div>

  <div class="status-bar">
    <span>9:41</span>
    <div class="battery"><div class="battery-fill"></div></div>
  </div>

  <div class="chat-header">
    <div class="chat-header-avatar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 3.5a1.5 1.5 0 110 3 1.5 1.5 0 010-3zm2 12h-4a1 1 0 010-2h1v-3h-1a1 1 0 010-2h2a1 1 0 011 1v4h1a1 1 0 010 2z"/></svg>
    </div>
    <div class="chat-header-info">
      <h3>Skill Coach</h3>
      <span>Online</span>
    </div>
  </div>

  <div class="chat-body">
    <div class="chat-area" id="chatArea">
      <!-- Messages rendered by JS -->
    </div>
    <div class="input-bar">
      <button class="mic-input-btn" onclick="handleMicClick()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--primary)"><path d="M12 15a3 3 0 003-3V5a3 3 0 00-6 0v7a3 3 0 003 3zm6-5a1 1 0 00-1 1v1a5 5 0 11-10 0v-1a1 1 0 10-2 0v1a7 7 0 1014 0v-1a1 1 0 00-1-1zm-3 10H9a1 1 0 000 2h6a1 1 0 000-2z"/></svg>
      </button>
      <input class="input-field" id="inputField" placeholder="Type karo..." readonly />
      <button class="send-btn" onclick="handleSend()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M19.79 10.16l-14-6A2 2 0 005 4a2 2 0 00-1.965 2.398 2 2 0 00.355.792L6.76 12l-3.35 4.79a2 2 0 002.38 3.05l14-6a2 2 0 000-3.68z"/></svg>
      </button>
    </div>
  </div>

  <div class="home-indicator"></div>
</div>

<script>
// === SVG Icon helpers ===
const ICONS = {
  mic: '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 15a3 3 0 003-3V5a3 3 0 00-6 0v7a3 3 0 003 3zm6-5a1 1 0 00-1 1v1a5 5 0 11-10 0v-1a1 1 0 10-2 0v1a7 7 0 1014 0v-1a1 1 0 00-1-1zm-3 10H9a1 1 0 000 2h6a1 1 0 000-2z"/></svg>',
  check: '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm5.21 7.71l-6 6a1.002 1.002 0 01-1.42 0l-3-3a1.003 1.003 0 111.42-1.42l2.29 2.3 5.29-5.3a1.004 1.004 0 011.42 1.42z"/></svg>',

// === Sarvam AI TTS ===
const SARVAM_API_KEY = 'sk_bjco0jfw_u9VUpaliZT6cAoT7EgaRxAks';
const SARVAM_TTS_URL = 'https://api.sarvam.ai/text-to-speech';
let ttsAudio = null;
let ttsCache = {};

async function speakHindi(text) {
  stopTTS();
  if (ttsCache[text]) { playBase64Audio(ttsCache[text]); return; }
  try {
    const res = await fetch(SARVAM_TTS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'api-subscription-key': SARVAM_API_KEY },
      body: JSON.stringify({
        inputs: [text],
        target_language_code: 'hi-IN',
        speaker: 'priya',
        model: 'bulbul:v3',
        enable_preprocessing: true
      })
    });
    if (!res.ok) throw new Error('Sarvam API error: ' + res.status);
    const data = await res.json();
    const b64 = data.audios && data.audios[0];
    if (b64) { ttsCache[text] = b64; playBase64Audio(b64); }
  } catch (err) {
    console.warn('Sarvam TTS failed, fallback:', err);
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'hi-IN'; utter.rate = 0.85;
    speechSynthesis.speak(utter);
  }
}

function playBase64Audio(base64) {
  ttsAudio = new Audio('data:audio/wav;base64,' + base64);
  ttsAudio.play().catch(err => console.warn('Audio play failed:', err));
}

function stopTTS() {
  if (ttsAudio) { ttsAudio.pause(); ttsAudio.currentTime = 0; ttsAudio = null; }
  speechSynthesis.cancel();
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

function addMsg(type, html, delay=0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const div = document.createElement('div');
      div.className = `msg msg-${type} fade-in`;
      div.innerHTML = `<div class="bubble bubble-${type}">${html}</div>`;
      chatArea.appendChild(div);
      scrollToBottom();
      resolve();
    }, delay);
  });
}

function addRaw(html, delay=0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const div = document.createElement('div');
      div.className = 'msg msg-ai msg-full fade-in';
      div.innerHTML = html;
      chatArea.appendChild(div);

      await addRaw(`<div class="chips">
        <span class="chip" onclick="goToState('yt_quality')">Quality Check Karo</span>
      </div>`, 200);
      break;

    case 'yt_quality':
      disableChips();
      await addMsg('user', 'Quality Check Karo');

      // Progress
      await addRaw(`<div style="margin-top:4px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
          <span style="font-size:10px;font-weight:700;color:var(--grey-60);text-transform:uppercase;letter-spacing:1px;">Step 5 / 5</span>
          <span style="display:inline-block;padding:3px 10px;border-radius:var(--radius-pill);background:var(--primary-light);color:var(--primary);font-size:10px;font-weight:700;">QUALITY CHECK</span>
        </div>
        <div class="progress-bar-container">
          <div class="progress-bar-fill" style="width:90%"></div>
        </div>
      </div>`, 0);

      await addRaw(`<div class="quality-card" id="qualityCard">
        <h4>AI Quality Check</h4>
        <div class="quality-check" id="qc1">
          <span>Hook 2 second mein clear?</span>
          <span class="qc-status pending" id="qc1-status">${ICONS.spinner}</span>
        </div>
        <div class="quality-check" id="qc2">
          <span>Text mobile pe readable?</span>
          <span class="qc-status pending" id="qc2-status">${ICONS.spinner}</span>
        </div>
        <div class="quality-check" id="qc3">
          <span>Video topic se match?</span>
          <span class="qc-status pending" id="qc3-status">${ICONS.spinner}</span>
        </div>
      </div>`, 0);

      // Animate quality checks
      await wait(1200);
      document.getElementById('qc1-status').className = 'qc-status pass';
      document.getElementById('qc1-status').innerHTML = ICONS.check;
      document.getElementById('qc1-status').style.color = 'var(--success)';

      await wait(1000);
      document.getElementById('qc2-status').className = 'qc-status pass';
      document.getElementById('qc2-status').innerHTML = ICONS.check;
      document.getElementById('qc2-status').style.color = 'var(--success)';

      await wait(1000);
      document.getElementById('qc3-status').className = 'qc-status pass';
      document.getElementById('qc3-status').innerHTML = ICONS.check;
      document.getElementById('qc3-status').style.color = 'var(--success)';

      await wait(500);
      // Add result to quality card
      const qCard = document.getElementById('qualityCard');
      if (qCard) {
        const resultDiv = document.createElement('div');
        resultDiv.className = 'quality-result fade-in';
        resultDiv.textContent = 'Yeh thumbnail clear, clickable, aur usable hai!';
        qCard.appendChild(resultDiv);
      }

      await addRaw(`<div class="chips">
        <span class="chip" onclick="goToState('yt_anchor')">Confirm Karo</span>
      </div>`, 400);
      break;

    case 'yt_anchor':
      disableChips();
      await addMsg('user', 'Confirm Karo');
      showTyping();
      await wait(600);
      hideTyping();

      await addRaw(`<div class="anchor-card">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
          <div style="width:36px;height:36px;background:rgba(255,255,255,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--sparkle);">${ICONS.brain}</div>
          <div style="font-size:10px;font-weight:700;color:var(--sparkle);text-transform:uppercase;letter-spacing:1px;">Why This Works</div>
        </div>
        <h4>Thumbnail = First Impression</h4>
        <p>Jab log scroll karte hain, unka dimaag 2 second mein decide karta hai ki click karna hai ya nahi. Ek achha thumbnail woh decision jeetata hai — clear face, bold text, aur high contrast ke saath.</p>
        <div class="anchor-skill">
          <div class="anchor-skill-label">Transferable Skill</div>
          <div class="anchor-skill-text">"Pehle 2 seconds mein dhyan kheenchna — yeh har visual content mein kaam aata hai."</div>
        </div>
        <div style="margin-top:12px;">
          <button class="listen-btn listen-btn-dark" onclick="speakHindi('Jab log scroll karte hain, unka dimaag 2 second mein decide karta hai ki click karna hai ya nahi. Ek achha thumbnail woh decision jeetata hai.')">${ICONS.play} Suno Hindi mein</button>
        </div>
      </div>`, 0);

      await addRaw(`<div class="chips">
        <span class="chip" onclick="goToState('yt_complete')">Samajh gaya, finish karo</span>
      </div>`, 300);
      break;

    case 'yt_complete':
      disableChips();
      await addMsg('user', 'Samajh gaya, finish karo');
      showTyping();
      await wait(600);
      hideTyping();

      // Progress 100%
      await addRaw(`<div style="margin-top:4px;">
        <div class="progress-bar-container">
          <div class="progress-bar-fill" style="width:100%;background:var(--success);"></div>
        </div>
      </div>`, 0);

      await addRaw(`<div class="complete-card">
        <div class="complete-icon">${ICONS.star}</div>
        <h3>Momentum Ban Gaya!</h3>
        <div class="complete-sub">Aapne Step 1 master kar liya. Ab rukna mat.</div>

        <div class="plan-card">
          <div class="plan-card-label">UP NEXT</div>
          <h4>7-Din Creator Plan</h4>
          <p>Maine aapke liye ek personalized schedule banaya hai — Titles, Tags, aur Editing next week tak master karo.</p>
          <button class="plan-cta" onclick="restartFlow()">
            ${ICONS.notify} Plan Activate Karo
          </button>
        </div>
      </div>`, 0);

      await wait(400);
      await addRaw(`<div class="chips">
        <span class="chip" onclick="restartFlow()">Dobara shuru karo</span>
      </div>`, 200);
      break;

  } } finally { stateTransitioning = false; }
}

// === User actions ===
function selectPrompt(type) {
  disableChips();
  if (type === 'youtube') {
    goToState('yt_problem');
  }
}

function updateCreateBtn() {
  const subject = document.getElementById('createSubject');
  const btn = document.getElementById('createGenBtn');
  if (subject && btn) {
    btn.disabled = !subject.value.trim();
  }
}

function generateThumbnail() {
  const subject = document.getElementById('createSubject');
  const emotion = document.getElementById('createEmotion');
  const text = document.getElementById('createText');
  createFormData.subject = subject ? subject.value : '';
  createFormData.emotion = emotion ? emotion.value : 'Shocked';
  createFormData.text = text ? text.value : '';

  // Disable form
  const card = document.getElementById('createFormCard');
  if (card) {
    card.querySelectorAll('input,select,button').forEach(el => el.disabled = true);
  }

  // Show user message
  addMsg('user', `Subject: ${createFormData.subject}, ${createFormData.emotion}`).then(() => {
    goToState('yt_generating');
  });
}

function restartFlow() {
  disableChips();
  chatArea.innerHTML = '';
  stateTransitioning = false;
  goToState('welcome');
}

// === Start ===
goToState('welcome');
</script>

</body>
</html>
