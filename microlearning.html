<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microlearning - Chat Prototype</title>

<style>
@font-face { font-family: 'JioType'; font-weight: 400; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeVarW05-Regular.woff2') format('woff2'); }
@font-face { font-family: 'JioType'; font-weight: 500; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Medium.woff2') format('woff2'); }
@font-face { font-family: 'JioType'; font-weight: 700; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Bold.woff2') format('woff2'); }
@font-face { font-family: 'JioType'; font-weight: 900; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Black.woff2') format('woff2'); }

:root {
  --primary: #3535f3;
  --primary-light: #e8e8fc;
  --primary-dark: #3900ad;
  --secondary: #f7ab20;
  --sparkle: #1eccb0;
  --error: #fa2f40;
  --warning: #f06d0f;
  --success: #25ab21;
  --grey-100: #141414;
  --grey-80: #5c5c5c;
  --grey-60: #8f8f8f;
  --grey-40: #e0e0e0;
  --grey-20: #f5f5f5;
  --surface-ghost: #eeeeef;
  --surface-bold: #3900ad;
  --white: #ffffff;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 23px;
  --radius-pill: 999px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: 'JioType'; background: var(--white); display: flex; flex-direction: column; }

.phone-frame {
  width: 100%; height: 100%; background: var(--white);
  position: relative; overflow: hidden;
}

.notch { display: none; }
.notch-pill { display: none; }
.status-bar { display: none; }
.battery { display: none; }
.battery::after { display: none; }
.battery-fill { display: none; }

.chat-header {
  height: 56px; padding: 0 16px; display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--grey-40); background: var(--white); position: relative; z-index: 80;
}
.back-btn {
  width: 32px; height: 32px; border-radius: 50%; border: none; background: transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; color: var(--grey-100); flex-shrink: 0;
}
.back-btn:hover { background: var(--surface-ghost); }
.back-btn:active { transform: scale(0.9); }
.chat-header-avatar {
  width: 36px; height: 36px; border-radius: 50%; background: var(--primary);
  display: flex; align-items: center; justify-content: center;
}
.chat-header-info h3 { font-size: 16px; font-weight: 700; color: var(--grey-100); line-height: 1.2; }
.chat-header-info span { font-size: 12px; color: var(--success); font-weight: 500; }

.chat-area {
  flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 8px;
  display: flex; flex-direction: column; gap: 12px;
  scroll-behavior: smooth; background: var(--white);
}
.chat-area::-webkit-scrollbar { width: 0; }
.chat-body { display: flex; flex-direction: column; height: calc(100vh - 56px - 88px); }

.msg { max-width: 88%; animation: msgIn 0.35s ease-out; }
.msg-ai { align-self: flex-start; }
.msg-user { align-self: flex-end; }
.msg-full { max-width: 100%; }

.bubble {
  padding: 12px 16px; font-size: 14px; line-height: 1.5; color: var(--grey-100);
  word-wrap: break-word;
}
.bubble-ai {
  background: var(--surface-ghost); border-radius: 4px var(--radius-lg) var(--radius-lg) var(--radius-lg);
}
.bubble-user {
  background: var(--primary); color: var(--white);
  border-radius: var(--radius-lg) 4px var(--radius-lg) var(--radius-lg);
}

.chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.chip {
  padding: 8px 16px; border-radius: var(--radius-pill); border: 1.5px solid var(--primary);
  color: var(--primary); font-size: 13px; font-weight: 700; cursor: pointer;
  background: var(--white); transition: all 0.2s;
}
.chip:hover, .chip:active { background: var(--primary); color: var(--white); }
.chip-disabled {
  border-color: var(--grey-40); color: var(--grey-60); cursor: default; opacity: 0.38;
}
.chip-disabled:hover, .chip-disabled:active { background: var(--white); color: var(--grey-60); }

/* Progress bar */
.progress-bar-container {
  background: var(--grey-40); border-radius: var(--radius-pill); height: 6px;
  width: 100%; overflow: hidden;
}
.progress-bar-fill {
  height: 100%; background: var(--primary); border-radius: var(--radius-pill);
  transition: width 0.5s ease;
}

/* === Step Carousel === */
.step-carousel {
  background: var(--white); border: 1.5px solid var(--grey-40); border-radius: var(--radius-lg);
  margin-top: 8px; overflow: hidden;
}
.step-carousel-header {
  padding: 12px 16px 8px;
}
.step-carousel-header .step-meta {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;
}
.step-carousel-header .step-label {
  font-size: 10px; font-weight: 700; color: var(--grey-60); text-transform: uppercase; letter-spacing: 1px;
}
.step-carousel-header .step-tag {
  display: inline-block; padding: 3px 10px; border-radius: var(--radius-pill);
  background: var(--primary-light); color: var(--primary); font-size: 10px; font-weight: 700;
}

.step-panels { position: relative; }
.step-panel { display: none; animation: fadeSlide 0.3s ease-out; }
.step-panel.active { display: block; }

.step-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px 14px; border-top: 1px solid var(--grey-40); margin-top: 4px;
}
.step-nav-btn {
  width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid var(--grey-40);
  background: var(--white); font-size: 18px; font-weight: 700; color: var(--grey-100);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.step-nav-btn:hover { background: var(--surface-ghost); }
.step-nav-btn:disabled { opacity: 0.25; cursor: default; }
.step-nav-btn:disabled:hover { background: var(--white); }

.step-dots { display: flex; gap: 6px; }
.step-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--grey-40); transition: all 0.3s;
}
.step-dot.active { background: var(--primary); width: 20px; border-radius: 4px; }
.step-dot.done { background: var(--success); }

@keyframes fadeSlide { from { opacity: 0; transform: translateX(12px); } to { opacity: 1; transform: translateX(0); } }

/* Concept card inside carousel */
.carousel-concept {
  background: var(--grey-100); color: var(--white); overflow: hidden;
}
.carousel-concept img {
  width: 100%; height: 120px; object-fit: cover; display: block; opacity: 0.8;
}
.carousel-concept-body { padding: 14px 16px; }
.carousel-concept-tag {
  display: inline-block; padding: 3px 10px; border-radius: var(--radius-pill);
  background: var(--primary); color: var(--white); font-size: 10px;
  font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;
}
.carousel-concept h4 { font-size: 16px; font-weight: 900; margin-bottom: 4px; }
.carousel-concept p { font-size: 12px; color: rgba(255,255,255,0.7); line-height: 1.5; }

/* Compare inside carousel */
.carousel-compare { padding: 14px 16px; }
.carousel-compare h4 { font-size: 15px; font-weight: 900; color: var(--grey-100); margin-bottom: 4px; }
.carousel-compare .compare-sub { font-size: 11px; color: var(--grey-60); margin-bottom: 12px; }
.compare-item { margin-bottom: 12px; }
.compare-label {
  display: inline-block; padding: 3px 10px; border-radius: var(--radius-pill);
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px;
}
.compare-label.bad { background: rgba(250,47,64,0.1); color: var(--error); }
.compare-label.good { background: rgba(37,171,33,0.1); color: var(--success); }
.compare-img {
  width: 100%; height: 90px; object-fit: cover; border-radius: var(--radius-md); display: block;
}
.compare-item.bad .compare-img { opacity: 0.6; border: 2px solid rgba(250,47,64,0.3); }
.compare-item.good .compare-img { border: 2px solid var(--success); }
.compare-reason {
  display: flex; align-items: flex-start; gap: 6px; margin-top: 4px; font-size: 11px;
}
.compare-reason.bad { color: var(--error); }
.compare-reason.good { color: var(--success); font-weight: 700; }

/* Create form inside carousel */
.carousel-create { padding: 14px 16px; }
.carousel-create h4 { font-size: 15px; font-weight: 900; color: var(--grey-100); margin-bottom: 4px; }
.carousel-create .create-sub { font-size: 11px; color: var(--grey-60); margin-bottom: 12px; }
.create-label { font-size: 10px; font-weight: 700; color: var(--grey-60); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.create-input {
  width: 100%; padding: 10px 14px; border-radius: var(--radius-md); border: 1.5px solid var(--grey-40);
  font-family: 'JioType'; font-size: 13px; color: var(--grey-100); background: var(--surface-ghost);
  outline: none; transition: border-color 0.2s; margin-bottom: 10px;
}
.create-input:focus { border-color: var(--primary); }
.create-input::placeholder { color: var(--grey-60); }
.create-select {
  width: 100%; padding: 10px 14px; border-radius: var(--radius-md); border: 1.5px solid var(--grey-40);
  font-family: 'JioType'; font-size: 13px; color: var(--grey-100); background: var(--surface-ghost);
  outline: none; margin-bottom: 10px; -webkit-appearance: none;
}
.create-row { display: flex; gap: 8px; }
.create-row > div { flex: 1; }
.create-btn {
  width: 100%; padding: 11px; border-radius: var(--radius-xl); border: none;
  background: var(--primary); color: var(--white); font-family: 'JioType';
  font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.create-btn:active { transform: scale(0.98); }
.create-btn:disabled { background: var(--grey-40); color: var(--grey-60); cursor: default; }

/* Result inside carousel */
.carousel-result { position: relative; }
.carousel-result img { width: 100%; height: 180px; object-fit: cover; display: block; }
.carousel-result .result-overlay {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(transparent 40%, rgba(0,0,0,0.75));
  display: flex; align-items: flex-end; padding: 16px;
}
.carousel-result .result-overlay h3 {
  font-size: 20px; font-weight: 900; color: var(--white); text-transform: uppercase;
  font-style: italic; letter-spacing: -0.5px; line-height: 1.1;
}
.share-actions {
  display: flex; gap: 8px; padding: 12px 16px;
}
.share-btn {
  flex: 1; padding: 10px; border-radius: var(--radius-md); border: 1.5px solid var(--grey-40);
  background: var(--white); font-family: 'JioType'; font-size: 12px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: all 0.2s; color: var(--grey-100);
}
.share-btn:hover { background: var(--surface-ghost); }
.share-btn.whatsapp { border-color: #25D366; color: #25D366; }
.share-btn.whatsapp:hover { background: rgba(37,211,102,0.08); }
.share-btn.download { border-color: var(--primary); color: var(--primary); }
.share-btn.download:hover { background: var(--primary-light); }

/* Quality check inside carousel */
.carousel-quality { padding: 14px 16px; }
.carousel-quality h4 { font-size: 15px; font-weight: 900; color: var(--grey-100); margin-bottom: 10px; }
.quality-check {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px; background: var(--surface-ghost); border-radius: var(--radius-md);
  margin-bottom: 6px; font-size: 12px; font-weight: 500; color: var(--grey-80);
}
.quality-check .qc-status { display: flex; align-items: center; }
.quality-check .qc-status.pending { color: var(--grey-60); }
.quality-check .qc-status.pass { color: var(--success); }
.quality-result {
  margin-top: 10px; padding: 10px; border-radius: var(--radius-md);
  background: rgba(37,171,33,0.08); border: 1px solid rgba(37,171,33,0.2);
  text-align: center; font-size: 12px; font-weight: 700; color: var(--success);
}

/* Roadmap card */
.roadmap-card {
  background: var(--white); border: 1px solid var(--grey-40); border-radius: var(--radius-lg);
  padding: 16px; margin-top: 8px;
}
.roadmap-card h4 { font-size: 16px; font-weight: 900; color: var(--grey-100); margin-bottom: 4px; }
.roadmap-card .roadmap-sub { font-size: 12px; color: var(--grey-60); margin-bottom: 16px; }
.roadmap-step {
  display: flex; align-items: center; gap: 12px; padding: 10px 12px;
  border-radius: var(--radius-md); margin-bottom: 6px; transition: all 0.2s;
}
.roadmap-step.active { background: var(--primary); }
.roadmap-step.locked { background: var(--surface-ghost); }
.roadmap-num {
  width: 28px; height: 28px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0;
}
.roadmap-step.active .roadmap-num { background: var(--white); color: var(--primary); }
.roadmap-step.locked .roadmap-num { background: var(--grey-40); color: var(--grey-60); }
.roadmap-step-text h5 { font-size: 13px; font-weight: 700; }
.roadmap-step-text p { font-size: 10px; }
.roadmap-step.active .roadmap-step-text h5 { color: var(--white); }
.roadmap-step.active .roadmap-step-text p { color: rgba(255,255,255,0.7); }
.roadmap-step.locked .roadmap-step-text h5 { color: var(--grey-80); }
.roadmap-step.locked .roadmap-step-text p { color: var(--grey-60); }
.roadmap-step-icon { margin-left: auto; }
.roadmap-step.active .roadmap-step-icon { color: var(--white); }
.roadmap-step.locked .roadmap-step-icon { color: var(--grey-60); }

/* Concept card (for CTR explanation) */
.concept-card {
  background: var(--grey-100); border-radius: var(--radius-lg); overflow: hidden;
  color: var(--white); margin-top: 8px;
}
.concept-card-img { width: 100%; height: 140px; object-fit: cover; display: block; opacity: 0.8; }
.concept-card-body { padding: 16px; }
.concept-card-tag {
  display: inline-block; padding: 3px 10px; border-radius: var(--radius-pill);
  background: var(--primary); color: var(--white); font-size: 10px;
  font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
}
.concept-card h4 { font-size: 18px; font-weight: 900; margin-bottom: 6px; }
.concept-card p { font-size: 13px; color: rgba(255,255,255,0.7); line-height: 1.5; }

/* Anchor card */
.anchor-card {
  background: var(--grey-100); border-radius: var(--radius-lg); padding: 20px;
  color: var(--white); margin-top: 8px; position: relative; overflow: hidden;
}
.anchor-card::before {
  content: ''; position: absolute; top: -20px; right: -20px; width: 120px; height: 120px;
  background: var(--primary); border-radius: 50%; opacity: 0.2; filter: blur(30px);
}
.anchor-card h4 { font-size: 18px; font-weight: 900; margin-bottom: 8px; position: relative; }
.anchor-card p { font-size: 13px; color: rgba(255,255,255,0.7); line-height: 1.5; margin-bottom: 16px; position: relative; }
.anchor-skill {
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-md); padding: 12px; position: relative;
}
.anchor-skill-label { font-size: 10px; font-weight: 700; color: var(--sparkle); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.anchor-skill-text { font-size: 13px; font-weight: 500; color: var(--white); }

/* Complete card */
.complete-card {
  background: var(--white); border: 1px solid var(--grey-40); border-radius: var(--radius-lg);
  padding: 24px; margin-top: 8px; text-align: center; position: relative; overflow: hidden;
}
.complete-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--success), var(--primary), var(--secondary));
}
.complete-icon {
  width: 64px; height: 64px; border-radius: 50%; background: var(--secondary);
  display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;
  box-shadow: 0 8px 24px rgba(247,171,32,0.3);
}
.complete-card h3 { font-size: 22px; font-weight: 900; color: var(--grey-100); margin-bottom: 4px; }
.complete-card .complete-sub { font-size: 13px; color: var(--grey-60); margin-bottom: 20px; }
.plan-card {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: var(--radius-lg); padding: 20px; color: var(--white); text-align: left;
}
.plan-card-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.6); margin-bottom: 4px; }
.plan-card h4 { font-size: 18px; font-weight: 900; margin-bottom: 8px; }
.plan-card p { font-size: 12px; color: rgba(255,255,255,0.7); line-height: 1.5; margin-bottom: 16px; }
.plan-cta {
  width: 100%; padding: 12px; border-radius: var(--radius-md); border: none;
  background: var(--white); color: var(--primary); font-family: 'JioType';
  font-size: 14px; font-weight: 900; cursor: pointer; display: flex;
  align-items: center; justify-content: center; gap: 8px;
}
.plan-cta:active { transform: scale(0.98); }

/* Listen button */
.listen-btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px;
  border-radius: var(--radius-pill); background: var(--primary);
  border: 1px solid var(--primary); color: var(--white); font-size: 11px;
  font-weight: 700; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.5px;
}
.listen-btn:hover { background: var(--primary-dark); }
.listen-btn-dark {
  background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3);
}
.listen-btn-dark:hover { background: rgba(255,255,255,0.25); }

/* Multi-modal chat input */
.input-widget {
  padding: 2px 12px 16px; background: var(--white); position: relative; z-index: 80;
}
.input-field-wrap {
  background: var(--surface-ghost); border-radius: var(--radius-xl); padding: 6px;
  display: flex; flex-direction: column;
}
.input-text-area { padding: 10px 8px; display: flex; align-items: center; }
.input-text-area input {
  font-family: 'JioType'; font-size: 14px; font-weight: 400; color: var(--grey-100);
  background: transparent; border: none; outline: none; width: 100%; line-height: 1.3;
}
.input-text-area input::placeholder { color: var(--grey-60); opacity: 0.65; }
.input-actions { display: flex; justify-content: space-between; align-items: center; height: 43px; }
.input-left-actions { display: flex; gap: 2px; }
.input-icon-btn {
  width: 36px; height: 36px; border-radius: var(--radius-pill);
  display: flex; align-items: center; justify-content: center;
  background: #e7e9ff; border: none; cursor: pointer;
}
.input-icon-btn:active { opacity: 0.7; }
.input-icon-btn svg { width: 20px; height: 20px; }
.speak-btn {
  background: var(--surface-bold); border: none; border-radius: var(--radius-pill);
  padding: 10px 20px; display: flex; align-items: center; gap: 8px; cursor: pointer;
}
.speak-btn:active { opacity: 0.85; }
.speak-btn svg { width: 18px; height: 18px; }
.speak-btn span { font-family: 'JioType'; font-weight: 700; font-size: 14px; color: var(--white); line-height: 1; }
.home-indicator { display: none; }

/* Typing indicator */
.typing { display: flex; gap: 4px; padding: 12px 16px; }
.typing-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--grey-60);
  animation: typingAnim 1.2s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

/* Skeleton loading */
.skeleton {
  background: linear-gradient(90deg, var(--surface-ghost) 25%, var(--grey-40) 50%, var(--surface-ghost) 75%);
  background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: var(--radius-sm);
}
.skeleton-line { height: 14px; margin-bottom: 8px; }
.skeleton-line:last-child { width: 60%; }

/* Animations */
@keyframes msgIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes typingAnim { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1); } }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
@keyframes spinAnim { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.hidden { display: none !important; }
.fade-in { animation: msgIn 0.4s ease-out; }
</style>
</head>

<div class="phone-frame">
  <div class="chat-header">
    <button class="back-btn" onclick="window.location.href='career.html'">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19 11H7.83l4.88-4.88a1.008 1.008 0 00-1.42-1.42l-6.59 6.59a1 1 0 000 1.42l6.59 6.59a1.002 1.002 0 001.639-.325 1 1 0 00-.22-1.095L7.83 13H19a1 1 0 000-2z"/></svg>
    </button>
    <div class="chat-header-avatar">

// === Sarvam AI TTS with pre-caching ===
const SARVAM_API_KEY = 'sk_bjco0jfw_u9VUpaliZT6cAoT7EgaRxAks';
const SARVAM_TTS_URL = 'https://api.sarvam.ai/text-to-speech';
let ttsAudio = null;
const ttsCache = {};

const TTS_TEXTS = {
  ctr: 'Click-Through Rate matlab kitne log aapka video cover dekhke actually click karte hain. Agar 100 log dekhein aur 5 click karein toh 5 percent CTR hai.',
  hook: 'Hook woh ek element hai jo scroll rokta hai. Yeh usually ek face ya massive contrast hota hai. Bina hook ke design koi kaam nahi karega.',
  prompting: 'AI ko ek structured formula chahiye. Subject plus Action ya Emotion. Jitna specific bologe utna achha result milega.',
  anchor: 'Jab log scroll karte hain, unka dimaag 2 second mein decide karta hai ki click karna hai ya nahi. Ek achha thumbnail woh decision jeetata hai.'
};

// Pre-cache all TTS audio on page load
async function preCacheTTS() {
  for (const key of Object.keys(TTS_TEXTS)) {
    try {
      const res = await fetch(SARVAM_TTS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'api-subscription-key': SARVAM_API_KEY },
        body: JSON.stringify({
          inputs: [TTS_TEXTS[key]],
          target_language_code: 'hi-IN',
          speaker: 'priya',
          model: 'bulbul:v3',
          enable_preprocessing: true,
          pace: 1.2
        })
      });
      if (!res.ok) continue;
      const data = await res.json();
      if (data.audios && data.audios[0]) ttsCache[TTS_TEXTS[key]] = data.audios[0];
    } catch (e) { /* ignore pre-cache errors */ }
  }
}
preCacheTTS();

async function speakHindi(text) {
  stopTTS();
  if (ttsCache[text]) { playBase64Audio(ttsCache[text]); return; }
  try {
    const res = await fetch(SARVAM_TTS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'api-subscription-key': SARVAM_API_KEY },
      body: JSON.stringify({
        inputs: [text],
        target_language_code: 'hi-IN',
        speaker: 'priya',
        model: 'bulbul:v3',
        enable_preprocessing: true,
        pace: 1.2
      })
    });
    if (!res.ok) throw new Error('TTS error');
    const data = await res.json();
    const b64 = data.audios && data.audios[0];
    if (b64) { ttsCache[text] = b64; playBase64Audio(b64); }
  } catch (err) {
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'hi-IN'; utter.rate = 0.85;
    speechSynthesis.speak(utter);
  }
}

function playBase64Audio(base64) {
  ttsAudio = new Audio('data:audio/wav;base64,' + base64);
  ttsAudio.play().catch(() => {});
}

function stopTTS() {
  if (ttsAudio) { ttsAudio.pause(); ttsAudio.currentTime = 0; ttsAudio = null; }
  speechSynthesis.cancel();
}

// === Carousel Functions ===
function goToStep(n) {
  if (n < 1 || n > 5) return;
  // Can't go past step 4 until form is generated
  if (n === 5 && !stepGenerated) return;

  currentStep = n;

  // Update panels
  document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('active'));
  const panel = document.querySelector(`.step-panel[data-step="${n}"]`);
  if (panel) panel.classList.add('active');

  // Update header
  const label = document.getElementById('stepLabel');
  const tag = document.getElementById('stepTag');
  const progress = document.getElementById('stepProgress');
  if (label) label.textContent = `Step ${n} / 5`;
  if (tag) tag.textContent = STEP_TAGS[n - 1];
  if (progress) progress.style.width = (n * 20) + '%';

  // Update dots
  document.querySelectorAll('.step-dot').forEach((d, i) => {
    d.classList.remove('active', 'done');
    if (i + 1 === n) d.classList.add('active');
    else if (i + 1 < n) d.classList.add('done');
  });

  // Update nav buttons
  const prevBtn = document.getElementById('stepPrevBtn');
  const nextBtn = document.getElementById('stepNextBtn');
  if (prevBtn) prevBtn.disabled = (n === 1);
  if (nextBtn) {
    if (n === 5) {
      nextBtn.disabled = true;
    } else if (n === 4 && !stepGenerated) {
      nextBtn.disabled = true;
    } else {
      nextBtn.disabled = false;
    }
  }

  // Run quality check animation when arriving at step 5
  if (n === 5 && !qualityDone) {
    runQualityCheck();
  }

  scrollToBottom();
}

function nextStep() { goToStep(currentStep + 1); }
function prevStep() { goToStep(currentStep - 1); }

            <div class="compare-item good">
              <span class="compare-label good">Good Thumbnail</span>
              <img class="compare-img" src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=600&auto=format&fit=crop" alt="Good" />
              <div class="compare-reason good">${ICONS.check} <span>Clear hook, big contrast, readable — click milega!</span></div>
            </div>
          </div>
        </div>

        <!-- Step 4: Create -->
        <div class="step-panel" data-step="4">
          <div class="carousel-create" id="createFormCard">
            <h4>${ICONS.wand} Guided Creation</h4>
            <div class="create-sub">Apna idea frame karo. Ek bold version try karo.</div>
            <div class="create-label">Subject (Kaun/Kya?)</div>
            <input class="create-input" id="createSubject" type="text" placeholder="e.g. Stressed chef in kitchen" oninput="updateCreateBtn()" />
            <div class="create-row">
              <div>
                <div class="create-label">Emotion</div>
                <select class="create-select" id="createEmotion">
                  <option value="Shocked">Shocked</option>
                  <option value="Angry">Angry</option>
                  <option value="Happy">Happy</option>
                </select>
              </div>
              <div>
                <div class="create-label">Vibe</div>
                <select class="create-select" id="createVibe">
                  <option value="Cinematic">Cinematic</option>
                  <option value="Neon">Neon</option>
                  <option value="Natural">Natural</option>
                </select>
              </div>
            </div>
            <div class="create-label">Overlay Text (Hook)</div>
            <input class="create-input" id="createText" type="text" placeholder="e.g. SECRET REVEALED!" />
            <button class="create-btn" id="createGenBtn" disabled onclick="generateInCarousel()">
              ${ICONS.wand} Generate Karo
            </button>
          </div>
        </div>

        <!-- Step 5: Quality Check -->
        <div class="step-panel" data-step="5">
          <div class="carousel-quality" id="qualityCardInner">
            <h4>AI Quality Check</h4>
            <div class="quality-check"><span>Hook 2 second mein clear?</span><span class="qc-status pending" id="qc1-status">${ICONS.spinner}</span></div>
            <div class="quality-check"><span>Text mobile pe readable?</span><span class="qc-status pending" id="qc2-status">${ICONS.spinner}</span></div>
            <div class="quality-check"><span>Video topic se match?</span><span class="qc-status pending" id="qc3-status">${ICONS.spinner}</span></div>
          </div>
        </div>
      </div>

      <div class="step-nav">
        <button class="step-nav-btn" id="stepPrevBtn" onclick="prevStep()" disabled>${ICONS.arrowLeft}</button>
        <div class="step-dots" id="stepDots">
          <span class="step-dot active"></span>
          <span class="step-dot"></span>
          <span class="step-dot"></span>
          <span class="step-dot"></span>
          <span class="step-dot"></span>
        </div>
        <button class="step-nav-btn" id="stepNextBtn" onclick="nextStep()">${ICONS.arrowRight}</button>
      </div>
    </div>
    <div id="postCarouselChips" class="hidden"></div>
  `;
}

// === State transitions ===
async function goToState(state) {
  if (stateTransitioning) return;
  stateTransitioning = true;
  currentState = state;

  try { switch(state) {

    case 'welcome':
      showTyping();
      await wait(800);
      hideTyping();
      await addMsg('ai', `Namaste Deepak! Main aapka Skill Coach hoon. Kya seekhna chahte ho aaj?`);
      await addRaw(`<div class="chips">
        <span class="chip" onclick="selectPrompt('youtube')">Mere YouTube views kam hain</span>
        <span class="chip chip-disabled" onclick="showComingSoon()">Mera Excel fix karo</span>
        <span class="chip chip-disabled" onclick="showComingSoon()">Email likhna hai</span>
      </div>`, 200);
      break;

    case 'yt_problem':
      disableChips();
      await addMsg('user', 'Mere YouTube views kam hain');
      showTyping();
      await wait(1000);
      hideTyping();
      await addMsg('ai', `Main samajh sakta hoon. Yeh usually tab hota hai jab log aapka video dekhte hain par click nahi karte. Isko kehte hain <strong>Click-Through Rate (CTR)</strong> problem.`);
      await wait(600);
      showTyping();
      await wait(800);
      hideTyping();
      await addMsg('ai', `Main aapke liye ek mini-course banata hoon. Pehle samjho ki CTR kya hai.`);
      await addRaw(`<div class="chips">
        <span class="chip" onclick="goToState('yt_ctr_explain')">CTR samjhao</span>
        <span class="chip" onclick="goToState('yt_roadmap')">Seedha fix batao</span>
      </div>`, 200);
      break;

    case 'yt_ctr_explain':
      disableChips();
      await addMsg('user', 'CTR samjhao');
      showSkeleton();
      await wait(1200);
      hideSkeleton();

      await addRaw(`<div class="concept-card">
        <img class="concept-card-img" src="https://images.unsplash.com/photo-1551288049-bebda4e38f71?q=80&w=600&auto=format&fit=crop" alt="Analytics" />
        <div class="concept-card-body">
          <span class="concept-card-tag">Concept</span>
          <h4>Click-Through Rate (CTR)</h4>
          <p>CTR matlab kitne log aapka video cover dekhke actually click karte hain. Agar 100 log dekhein aur 5 click karein = <strong>5% CTR</strong>.</p>
          <div style="margin-top:12px;">
            <button class="listen-btn listen-btn-dark" onclick="speakHindi(TTS_TEXTS.ctr)">${ICONS.play} Suno Hindi mein</button>
          </div>
        </div>
      </div>`, 0);

      await addRaw(`<div class="chips">
        <span class="chip" onclick="goToState('yt_roadmap')">Achha, ab fix batao</span>
      </div>`, 300);
      break;

    case 'yt_roadmap':
      disableChips();
      await addMsg('user', 'Ab fix batao');
      showTyping();
      await wait(800);
      hideTyping();
      await addMsg('ai', `CTR fix karne ke liye 3 cheezein optimize karni hain. Aaj hum sabse important se shuru karte hain.`);

      await addRaw(`<div class="roadmap-card">
        <h4>3-Step Fix Plan</h4>
        <div class="roadmap-sub">Aaj Thumbnail se shuru karte hain</div>
        <div class="roadmap-step active">
          <div class="roadmap-num">1</div>
          <div class="roadmap-step-text"><h5>Thumbnail</h5><p>Visual Hook (Aaj yeh karenge)</p></div>
          <div class="roadmap-step-icon">${ICONS.play}</div>
        </div>
        <div class="roadmap-step locked">
          <div class="roadmap-num">2</div>
          <div class="roadmap-step-text"><h5>Title</h5><p>Curiosity Gap</p></div>
          <div class="roadmap-step-icon">${ICONS.lock}</div>
        </div>
        <div class="roadmap-step locked">
          <div class="roadmap-num">3</div>
          <div class="roadmap-step-text"><h5>Topic</h5><p>Market Demand</p></div>
          <div class="roadmap-step-icon">${ICONS.lock}</div>
        </div>
      </div>`, 300);

      await addRaw(`<div class="chips">
        <span class="chip" onclick="goToState('yt_steps')">Thumbnail seekho</span>
      </div>`, 200);
      break;

    case 'yt_steps':
      disableChips();
      await addMsg('user', 'Thumbnail seekho');
      showSkeleton();
      await wait(1000);
      hideSkeleton();
      await addMsg('ai', `Yeh raha aapka 5-step mini-course! Arrows se navigate karo.`);

      // Reset carousel state
      currentStep = 1;
      stepGenerated = false;
      qualityDone = false;

      await addRaw(renderCarousel(), 0);
      break;

    case 'yt_anchor':
      disableChips();
      document.querySelectorAll('#postCarouselChips .chip').forEach(c => { c.style.pointerEvents = 'none'; c.style.opacity = '0.38'; });
      await addMsg('user', 'Samajh gaya, aage badho');
      showTyping();
      await wait(600);
      hideTyping();

      await addRaw(`<div class="anchor-card">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
          <div style="width:36px;height:36px;background:rgba(255,255,255,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--sparkle);">${ICONS.brain}</div>
          <div style="font-size:10px;font-weight:700;color:var(--sparkle);text-transform:uppercase;letter-spacing:1px;">Why This Works</div>
        </div>
        <h4>Thumbnail = First Impression</h4>
        <p>Jab log scroll karte hain, unka dimaag 2 second mein decide karta hai ki click karna hai ya nahi. Ek achha thumbnail woh decision jeetata hai — clear face, bold text, aur high contrast ke saath.</p>
        <div class="anchor-skill">
          <div class="anchor-skill-label">Transferable Skill</div>
          <div class="anchor-skill-text">"Pehle 2 seconds mein dhyan kheenchna — yeh har visual content mein kaam aata hai."</div>
        </div>
        <div style="margin-top:12px;">
          <button class="listen-btn listen-btn-dark" onclick="speakHindi(TTS_TEXTS.anchor)">${ICONS.play} Suno Hindi mein</button>
        </div>
      </div>`, 0);

      await addRaw(`<div class="chips">
        <span class="chip" onclick="goToState('yt_complete')">Samajh gaya, finish karo</span>
      </div>`, 300);
      break;

    case 'yt_complete':
      disableChips();
      await addMsg('user', 'Samajh gaya, finish karo');
      showTyping();
      await wait(600);
      hideTyping();

      await addRaw(`<div style="margin-top:4px;">
        <div class="progress-bar-container">
          <div class="progress-bar-fill" style="width:100%;background:var(--success);"></div>
        </div>
      </div>`, 0);

      await addRaw(`<div class="complete-card">
        <div class="complete-icon">${ICONS.star}</div>
        <h3>Momentum Ban Gaya!</h3>
        <div class="complete-sub">Aapne Step 1 master kar liya. Ab rukna mat.</div>
        <div class="plan-card">
          <div class="plan-card-label">UP NEXT</div>
          <h4>7-Din Creator Plan</h4>
          <p>Maine aapke liye ek personalized schedule banaya hai — Titles, Tags, aur Editing next week tak master karo.</p>
          <button class="plan-cta" onclick="restartFlow()">
            ${ICONS.notify} Plan Activate Karo
          </button>
        </div>
      </div>`, 0);

      await wait(400);
      await addRaw(`<div class="chips">
        <span class="chip" onclick="restartFlow()">Dobara shuru karo</span>
      </div>`, 200);
      break;

  } } finally { stateTransitioning = false; }
}

// === User actions ===
function selectPrompt(type) {
  disableChips();
  if (type === 'youtube') goToState('yt_problem');
}

function restartFlow() {
  disableChips();
  chatArea.innerHTML = '';
  stateTransitioning = false;
  goToState('welcome');
}

// === Start ===
goToState('welcome');
</script>

</body>
</html>
