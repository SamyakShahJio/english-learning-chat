<style>
@font-face { font-family: 'JioType'; font-weight: 400; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeVarW05-Regular.woff2') format('woff2'); }
@font-face { font-family: 'JioType'; font-weight: 500; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Medium.woff2') format('woff2'); }
@font-face { font-family: 'JioType'; font-weight: 700; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Bold.woff2') format('woff2'); }
@font-face { font-family: 'JioType'; font-weight: 900; src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Black.woff2') format('woff2'); }

:root {
  --primary: #3535f3;
  --primary-light: #e8e8fc;
  --primary-dark: #3900ad;
  --secondary: #f7ab20;
  --sparkle: #1eccb0;
  --error: #fa2f40;
  --warning: #f06d0f;
  --success: #25ab21;
  --grey-100: #141414;
  --grey-80: #5c5c5c;
  --grey-60: #8f8f8f;
  --grey-40: #e0e0e0;
  --grey-20: #f5f5f5;
  --surface-ghost: #eeeeef;
  --surface-bold: #3900ad;
  --white: #ffffff;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 23px;
  --radius-pill: 999px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: 'JioType'; background: var(--white); display: flex; flex-direction: column; }

.phone-frame {
  width: 100%; height: 100%; background: var(--white);
  position: relative; overflow: hidden;
}

/* Notch & status bar hidden */
.notch { display: none; }
.status-bar { display: none; }

/* Chat header */
.chat-header {
  height: 56px; padding: 0 16px; display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--grey-40); background: var(--white); position: relative; z-index: 80;
}
.back-btn {
  width: 32px; height: 32px; border-radius: 50%; border: none; background: transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; color: var(--grey-100); flex-shrink: 0;
}
.back-btn:hover { background: var(--surface-ghost); }
.back-btn:active { transform: scale(0.9); }
.chat-header-avatar {
  width: 36px; height: 36px; border-radius: 50%; background: var(--primary);
  display: flex; align-items: center; justify-content: center;
}
.chat-header-info h3 { font-size: 16px; font-weight: 700; color: var(--grey-100); line-height: 1.2; }
.chat-header-info span { font-size: 12px; color: var(--success); font-weight: 500; }

/* Chat area */
.chat-area {
  flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 8px;
  display: flex; flex-direction: column; gap: 12px;
  scroll-behavior: smooth; background: var(--white);
}
.chat-area::-webkit-scrollbar { width: 0; }
.chat-body { display: flex; flex-direction: column; height: calc(100vh - 56px - 88px); }

/* Message bubbles */
.msg { max-width: 88%; animation: msgIn 0.35s ease-out; }
.msg-ai { align-self: flex-start; }
.msg-user { align-self: flex-end; }

.bubble {
  padding: 12px 16px; font-size: 14px; line-height: 1.5; color: var(--grey-100);
  word-wrap: break-word;
}
.bubble-ai {
  background: var(--surface-ghost); border-radius: 4px var(--radius-lg) var(--radius-lg) var(--radius-lg);
}
.bubble-user {
  background: var(--primary); color: var(--white);
  border-radius: var(--radius-lg) 4px var(--radius-lg) var(--radius-lg);
}
.bubble-ai .guj { color: var(--grey-80); font-size: 13px; margin-top: 4px; display: block; }

/* Suggested chips */
.chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.chip {
  padding: 8px 16px; border-radius: var(--radius-pill); border: 1.5px solid var(--primary);
  color: var(--primary); font-size: 13px; font-weight: 700; cursor: pointer;
  background: var(--white); transition: all 0.2s;
}
.chip:hover, .chip:active { background: var(--primary); color: var(--white); }

/* Cards inside chat */
.card-grid { display: flex; gap: 8px; overflow-x: auto; padding: 4px 0; margin-top: 8px; }
.card-grid::-webkit-scrollbar { height: 0; }
.situation-card {
  flex-shrink: 0; width: 130px; padding: 16px; border-radius: var(--radius-lg);
  background: var(--white); border: 1.5px solid var(--grey-40); cursor: pointer;
  transition: all 0.2s; display: flex; flex-direction: column; gap: 8px;
}
.situation-card:hover, .situation-card:active { border-color: var(--primary); background: var(--primary-light); }
.situation-card .card-icon { width: 40px; height: 40px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--white); }
.situation-card .card-title { font-size: 13px; font-weight: 700; color: var(--grey-100); }
.situation-card .card-sub { font-size: 11px; color: var(--grey-60); }

/* Entry point cards */
.entry-card {
  padding: 14px 16px; border-radius: var(--radius-lg); background: var(--white);
  border: 1.5px solid var(--grey-40); cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; gap: 12px; margin-top: 6px;
}
.entry-card:hover, .entry-card:active { border-color: var(--primary); background: var(--primary-light); }
.entry-icon {
  width: 40px; height: 40px; border-radius: var(--radius-sm); background: var(--primary);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.entry-card h4 { font-size: 14px; font-weight: 700; color: var(--grey-100); }
.entry-card p { font-size: 12px; color: var(--grey-60); margin-top: 2px; }

/* Companion cards */
.companion-card {
  flex-shrink: 0; width: 140px; padding: 16px; border-radius: var(--radius-lg);
  background: var(--white); border: 1.5px solid var(--grey-40); cursor: pointer;
  transition: all 0.2s; text-align: center;
}
.companion-card:hover { border-color: var(--primary); }
.companion-avatar { width: 56px; height: 56px; border-radius: 50%; margin: 0 auto 8px; display: flex; align-items: center; justify-content: center; font-size: 28px; color: var(--white); }
.companion-card h4 { font-size: 14px; font-weight: 700; color: var(--grey-100); }
.companion-card .comp-type { font-size: 11px; color: var(--primary); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.companion-card .comp-sub { font-size: 11px; color: var(--grey-60); margin-top: 2px; }

/* Correction card */
.correction-card {
  background: var(--grey-100); border-radius: var(--radius-lg); padding: 16px; margin-top: 8px; color: var(--white);
}
.correction-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.correction-header svg { color: var(--sparkle); }
.correction-header span { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--sparkle); }
.correction-text { font-size: 18px; font-weight: 700; line-height: 1.4; margin-bottom: 12px; }
.grammar-box {
  background: rgba(255,255,255,0.08); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 12px;
  border: 1px solid rgba(255,255,255,0.1);
}
.grammar-label { display: flex; align-items: center; gap: 6px; color: var(--secondary); font-size: 10px; font-weight: 700; text-transform: uppercase; margin-bottom: 6px; }
.grammar-text { font-size: 13px; color: rgba(255,255,255,0.8); line-height: 1.5; }

/* Phrase card */
.phrase-card {
  background: var(--white); border: 1.5px solid var(--grey-40); border-radius: var(--radius-lg);
  padding: 14px; margin-top: 6px; display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.phrase-card .phrase-text { flex: 1; }
.phrase-card .phrase-en { font-size: 14px; font-weight: 700; color: var(--grey-100); line-height: 1.4; }
.phrase-card .phrase-phonetic { font-size: 11px; color: var(--primary); margin-top: 2px; font-style: italic; }
.phrase-card .phrase-context { font-size: 10px; color: var(--grey-60); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; margin-top: 4px; }
.phrase-btns { display: flex; gap: 6px; flex-shrink: 0; }

/* Vocab card */
.vocab-card {
  background: var(--primary); border-radius: var(--radius-lg); padding: 16px; margin-top: 6px; color: var(--white);
}
.vocab-word { font-size: 22px; font-weight: 900; margin-bottom: 2px; }
.vocab-phonetic { font-size: 12px; opacity: 0.7; font-style: italic; margin-bottom: 8px; }
.vocab-meaning-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; opacity: 0.5; margin-bottom: 2px; }
.vocab-meaning { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
.vocab-usage { font-size: 12px; opacity: 0.8; font-style: italic; line-height: 1.4; margin-bottom: 8px; }
.vocab-mistake {
  background: rgba(255,255,255,0.1); border-radius: var(--radius-sm); padding: 10px;
  border: 1px solid rgba(255,255,255,0.15);
}
.vocab-mistake .wrong { color: var(--error); font-size: 12px; }
.vocab-mistake .correct { color: var(--sparkle); font-size: 12px; font-weight: 700; margin-top: 2px; }

/* Greeting card */
.greeting-card {
  background: var(--surface-ghost); border-radius: var(--radius-lg); padding: 14px; margin-top: 6px;
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.greeting-en { font-size: 16px; font-weight: 900; color: var(--grey-100); }
.greeting-guj { font-size: 13px; color: var(--grey-80); margin-top: 2px; }
.greeting-phonetic { font-size: 11px; color: var(--primary); font-style: italic; margin-top: 2px; }

/* Milestone card */
.milestone-card {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: var(--radius-lg); padding: 20px; margin-top: 8px; color: var(--white); text-align: center;
}
.milestone-icon { width: 64px; height: 64px; background: rgba(255,255,255,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
.milestone-title { font-size: 20px; font-weight: 900; margin-bottom: 4px; }
.milestone-sub { font-size: 13px; opacity: 0.8; margin-bottom: 12px; }
.milestone-plan { background: rgba(255,255,255,0.1); border-radius: var(--radius-sm); padding: 12px; text-align: left; }
.milestone-plan-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 13px; }
.milestone-plan-num { width: 24px; height: 24px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }

/* Listen button */
.listen-btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px;
  border-radius: var(--radius-pill); background: var(--primary);
  border: 1px solid var(--primary); color: var(--white); font-size: 11px;
  font-weight: 700; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.5px;
}
.listen-btn:hover { background: var(--primary-dark); }
/* Invert listen button inside dark containers */
.correction-card .listen-btn, .vocab-card .listen-btn {
  background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3);
}
.correction-card .listen-btn:hover, .vocab-card .listen-btn:hover {
  background: rgba(255,255,255,0.25);
}

/* Icon buttons */
.icon-btn {
  width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; cursor: pointer; border: none; transition: all 0.2s;
}
.icon-btn-primary { background: var(--primary); color: var(--white); }
.icon-btn-ghost { background: var(--surface-ghost); color: var(--primary); }
.icon-btn:active { transform: scale(0.9); }

/* Pronunciation popover */
.pron-popover {
  background: var(--grey-100); color: var(--white); border-radius: var(--radius-md);
  padding: 12px 16px; margin-top: 6px; font-size: 13px; line-height: 1.5;
  border-left: 3px solid var(--secondary);
}
.pron-popover .pron-label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--secondary); letter-spacing: 0.5px; margin-bottom: 4px; }
.pron-popover .pron-ipa { font-style: italic; color: var(--sparkle); margin-bottom: 4px; }
.pron-popover .pron-tip { color: rgba(255,255,255,0.7); }

/* Mic recording state */
.mic-area {
  display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 16px 0; margin-top: 8px;
}
.mic-btn-large {
  width: 64px; height: 64px; border-radius: 50%; background: var(--primary); color: var(--white);
  display: flex; align-items: center; justify-content: center; border: none;
  cursor: pointer; box-shadow: 0 4px 20px rgba(53,53,243,0.3); transition: all 0.2s;
}
.mic-btn-large:active { transform: scale(0.9); }
.mic-btn-large.recording { background: var(--error); animation: pulse 1.2s infinite; }
.mic-label { font-size: 13px; font-weight: 700; color: var(--primary); }
.mic-waves { display: flex; gap: 3px; align-items: center; height: 32px; }
.mic-wave { width: 3px; background: var(--primary); border-radius: 99px; animation: waveAnim 0.8s ease-in-out infinite; }

/* Sarah avatar in chat */
.sarah-msg { display: flex; gap: 8px; align-items: flex-start; }
.sarah-avatar-sm { width: 28px; height: 28px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px; color: var(--white); }

/* Multi-modal chat input */
.input-widget {
  padding: 2px 12px 16px; background: var(--white); position: relative; z-index: 80;
}
.input-field-wrap {
  background: var(--surface-ghost); border-radius: var(--radius-xl); padding: 6px;
  display: flex; flex-direction: column;
}
.input-text-area { padding: 10px 8px; display: flex; align-items: center; }
.input-text-area input {
  font-family: 'JioType'; font-size: 14px; font-weight: 400; color: var(--grey-100);
  background: transparent; border: none; outline: none; width: 100%; line-height: 1.3;
}
.input-text-area input::placeholder { color: var(--grey-60); opacity: 0.65; }
.input-actions { display: flex; justify-content: space-between; align-items: center; height: 43px; }
.input-left-actions { display: flex; gap: 2px; }
.input-icon-btn {
  width: 36px; height: 36px; border-radius: var(--radius-pill);
  display: flex; align-items: center; justify-content: center;
  background: #e7e9ff; border: none; cursor: pointer;
}
.input-icon-btn:active { opacity: 0.7; }
.input-icon-btn svg { width: 20px; height: 20px; }
.speak-btn {
  background: var(--surface-bold); border: none; border-radius: var(--radius-pill);
  padding: 10px 20px; display: flex; align-items: center; gap: 8px; cursor: pointer;
}
.speak-btn:active { opacity: 0.85; }
.speak-btn svg { width: 18px; height: 18px; }
.speak-btn span { font-family: 'JioType'; font-weight: 700; font-size: 14px; color: var(--white); line-height: 1; }
.home-indicator { display: none; }

/* Typing indicator */
.typing { display: flex; gap: 4px; padding: 12px 16px; }
.typing-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--grey-60);
  animation: typingAnim 1.2s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

/* Skeleton loading */
.skeleton {
  background: linear-gradient(90deg, var(--surface-ghost) 25%, var(--grey-40) 50%, var(--surface-ghost) 75%);
  background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: var(--radius-sm);
}
.skeleton-line { height: 14px; margin-bottom: 8px; }
.skeleton-line:last-child { width: 60%; }

/* Animations */
@keyframes msgIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(250,47,64,0.4); } 50% { box-shadow: 0 0 0 16px rgba(250,47,64,0); } }
@keyframes waveAnim { 0%, 100% { height: 6px; } 50% { height: 24px; } }
@keyframes typingAnim { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1); } }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

/* Utility */
.hidden { display: none !important; }
.fade-in { animation: msgIn 0.4s ease-out; }
.flex-col { display: flex; flex-direction: column; }
.text-center { text-align: center; }
.mt-4 { margin-top: 4px; }
.mt-8 { margin-top: 8px; }
.mb-4 { margin-bottom: 4px; }
</style>
</head>

<script>
// === SVG Icon helpers ===
const ICONS = {

// === Sarvam AI Text-to-Speech Engine ===
const SARVAM_API_KEY = 'sk_bjco0jfw_u9VUpaliZT6cAoT7EgaRxAks';
const SARVAM_TTS_URL = 'https://api.sarvam.ai/text-to-speech';
const SARVAM_SPEAKER = 'amelia';
const ttsCache = new Map();
let currentAudio = null;

async function sarvamTTS(text, pace = 1.0) {
  const cacheKey = text + '|' + pace;
  if (ttsCache.has(cacheKey)) {
    const audio = new Audio(ttsCache.get(cacheKey));
    if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
    currentAudio = audio;
    audio.play().catch(() => {});
    return;
  }
  try {
    const res = await fetch(SARVAM_TTS_URL, {
      method: 'POST',
      headers: { 'api-subscription-key': SARVAM_API_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        inputs: [text],
        target_language_code: 'en-IN',
        speaker: SARVAM_SPEAKER,
        model: 'bulbul:v3',
        pace: pace
      })
    });
    const data = await res.json();
    if (data.audios && data.audios[0]) {
      const dataUrl = 'data:audio/wav;base64,' + data.audios[0];
      ttsCache.set(cacheKey, dataUrl);
      const audio = new Audio(dataUrl);
      if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
      currentAudio = audio;
      audio.play().catch(() => {});
    }
  } catch (e) {
    console.warn('Sarvam TTS failed, falling back to browser TTS:', e);
    browserSpeak(text, pace < 0.8 ? 0.65 : 0.85);
  }
}

// Browser TTS fallback
function browserSpeak(text, rate = 0.85) {
  speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'en-US'; utter.rate = rate; utter.pitch = 1;
  speechSynthesis.speak(utter);
}

function speak(text, rate = 0.85) {
  const pace = rate < 0.8 ? 0.7 : 1.0;
  sarvamTTS(text, pace);
}

function speakSlow(text) { sarvamTTS(text, 0.7); }

function iconBtn(icon, type='primary', onclick='') {
  return `<button class="icon-btn icon-btn-${type}" ${onclick ? `onclick="${onclick}"` : ''}>${ICONS[icon]}</button>`;
}
function listenBtn(text, onclick='') {
  const safeText = (text||'').replace(/'/g, "\\'");
  const finalOnclick = onclick || `speak('${safeText}')`;
  return `<button class="listen-btn" onclick="${finalOnclick}">${ICONS.play} Listen</button>`;
}

// === State Machine ===
const chatArea = document.getElementById('chatArea');
let currentState = 'welcome';
let messageHistory = [];

function addMsg(type, html, delay=0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const div = document.createElement('div');
      div.className = `msg msg-${type} fade-in`;
      div.innerHTML = `<div class="bubble bubble-${type}">${html}</div>`;
      chatArea.appendChild(div);
      scrollToBottom();
      resolve();
    }, delay);
  });
}

function addRaw(html, delay=0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const div = document.createElement('div');
      div.className = 'msg msg-ai fade-in';
      div.innerHTML = html;
      chatArea.appendChild(div);
      scrollToBottom();
      resolve();
    }, delay);
  });
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg msg-ai';
  div.id = 'typing-indicator';
  div.innerHTML = `<div class="bubble bubble-ai"><div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
  chatArea.appendChild(div);
  scrollToBottom();
}

function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function scrollToBottom() {
  setTimeout(() => { chatArea.scrollTop = chatArea.scrollHeight; }, 50);
}

// === Event handlers ===
function selectLanguage(lang) {
  addMsg('user', lang).then(() => goToState('lang_selected'));
}

function selectVocabTopic(topic) {
  addMsg('user', topic).then(() => goToState('j2_vocab_cards'));
}

function selectCompanion(name) {
  addMsg('user', `I'll practice with ${name}`).then(() => goToState('j3_sarah_intro'));
}

function simulateRecording() {
  const btn = event.currentTarget;
  btn.classList.add('recording');
  btn.parentElement.querySelector('.mic-label').textContent = 'Listening...';
  setTimeout(() => {
    btn.classList.remove('recording');
    btn.parentElement.remove();
    goToState('j1_bride_result');
  }, 1500);
}

function simulateVocabRecording() {
  const btn = event.currentTarget;
  btn.classList.add('recording');
  setTimeout(() => {
    btn.classList.remove('recording');
    btn.parentElement.remove();
    goToState('j2_vocab_feedback');
  }, 1500);
}

function simulateSarahConvo1() { goToState('j3_sarah_round1'); }
function simulateSarahConvo2() { goToState('j3_sarah_round2'); }
function simulateSarahConvo3() { goToState('j3_sarah_round3'); }

// Simulate mic recording on phrase/greeting cards — shows visual feedback + speaks
function simulateMicFeedback(btn) {
  const card = btn.closest('.phrase-card, .greeting-card');
  if (!card) return;
  const text = card.querySelector('.phrase-en, .greeting-en')?.textContent || '';
  btn.style.background = 'var(--error)';
  btn.innerHTML = ICONS.mic;
  setTimeout(() => {
    btn.style.background = '';
    // Show a success popover
    document.querySelectorAll('.dynamic-popover').forEach(e => e.remove());
    const pop = document.createElement('div');
    pop.className = 'pron-popover dynamic-popover fade-in';
    pop.style.borderLeftColor = 'var(--success)';
    pop.innerHTML = `
      <div class="pron-label" style="color:var(--success)">Good attempt!</div>
      <div class="pron-tip">Listen carefully and try again:</div>
    `;
    card.appendChild(pop);
    scrollToBottom();
    // Speak the correct version
    speakSlow(text);
  }, 1200);
}

// Simulate mic on vocab cards — speaks the word slowly
function simulateVocabMicFeedback(btn, word, correctPron) {
  btn.style.background = 'rgba(250,47,64,0.4)';
  btn.innerHTML = ICONS.mic + ' Recording...';
  setTimeout(() => {
    btn.style.background = 'rgba(255,255,255,0.25)';
    btn.innerHTML = ICONS.mic + ' Try it';
    // Speak the correct pronunciation
    speakSlow(word);
  }, 1200);
}

// Data store for pronunciation popovers (avoids escaping issues in onclick)
const pronData = [];
function storePron(text, ipa, tip) {
  const idx = pronData.length;
  pronData.push({ text, ipa, tip });
  return idx;
}

function showPronById(el, idx) {
  const d = pronData[idx];
  showPronPopover(el, d.text, d.ipa, d.tip);
}

function showPronPopover(el, text, ipa, tip) {
  // Remove existing popovers
  document.querySelectorAll('.dynamic-popover').forEach(e => e.remove());
  const pop = document.createElement('div');
  pop.className = 'pron-popover dynamic-popover fade-in';
  pop.style.borderLeftColor = 'var(--secondary)';
  pop.innerHTML = `
    <div class="pron-label">Pronunciation: ${text}</div>
    <div class="pron-ipa">${ipa}</div>
    <div class="pron-tip">${tip}</div>
  `;
  el.closest('.phrase-card, .greeting-card, .correction-card, .vocab-card, .msg')?.appendChild(pop);
  scrollToBottom();
  // Speak the text aloud
  speakSlow(text);
}

function showNotReady() {
  addMsg('ai', `This situation is coming soon! Try "Meeting Bride" for the full experience.<span class="guj">આ પરિસ્થિતિ ટૂંક સમયમાં આવશે! "Meeting Bride" અજમાવો.</span>`);
}

function handleMicClick() {
  // Show a hint
  addMsg('ai', 'Tap the suggested prompts or the mic button inside the conversation to continue.');
}

function handleSend() {
  const input = document.getElementById('inputField');
  if (input.value.trim()) {
    addMsg('user', input.value).then(() => {
      input.value = '';
    });
  }
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

// === Init ===
goToState('welcome');
</script>
